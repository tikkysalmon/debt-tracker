  @keyframes barShimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  *, *::before, *::after { transition: background-color .2s ease, box-shadow .2s ease, transform .2s ease, border-color .2s ease, opacity .2s ease, color .2s ease, filter .2s ease; }

  [style*="cursor:pointer"]:hover { opacity: 0.86; }
  [style*="linear-gradient(135deg,#7c5cff"]:hover { filter: brightness(1.08); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(124,92,255,0.45) !important; }
  [style*="border-left:4px solid"]:hover, [style*="border-left:3px solid"]:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(43,37,64,0.14) !important; }
  [style*="backdrop-filter:blur"]:hover { box-shadow: 0 14px 36px rgba(124,92,255,0.16) !important; }
  [style*="conic-gradient"]:hover { transform: scale(1.03); filter: drop-shadow(0 10px 22px rgba(124,92,255,0.18)); }
  [style*="linear-gradient(180deg,#e0562f"]:hover { transform: translateY(-4px) scaleY(1.04); filter: drop-shadow(0 6px 14px rgba(224,49,49,0.35)); }
  button:hover { filter: brightness(1.06); }
  select:hover, input[type="text"]:hover, input[type="number"]:hover, input[type="date"]:hover { border-color: rgba(124,92,255,0.5) !important; }
  select:focus, input:focus { outline: 2px solid rgba(124,92,255,0.3); outline-offset: 1px; box-shadow: 0 0 0 4px rgba(124,92,255,0.1); }

</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
(function () {
  // ---------- Config (from design props) ----------
  var CFG = { screenDays: 3, lockDays: 5 };
  var AUTO_STATUS_ENABLED = true;

  // ---------- Constants ----------
  var LATE_STATUSES = ['ค้างชำระ', 'เกินกำหนดชำระ', 'เปลี่ยนภาพพักหน้าจอ', 'ล็อคเครื่อง', 'ค้างชำระ ล็อคเครื่องไม่ได้', 'หนี้สงสัยจะสูญ', 'ชำระบางส่วน'];
  var NOTDUE_STATUSES = ['ยังไม่ถึงกำหนดชำระ', 'ถึงกำหนดชำระ'];
  var AGE_BUCKETS = [[12, 14], [15, 17], [18, 25], [26, 30], [31, 35], [36, 40], [41, 45], [46, 50], [51, 55], [56, 60], [61, 200]];
  var MONTH_LABELS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
  var STATUS_META = {
    'ยังไม่ถึงกำหนดชำระ': { color: '#748199', order: 0 },
    'ถึงกำหนดชำระ': { color: '#4f7cff', order: 1 },
    'ค้างชำระ': { color: '#c99a00', order: 2 },
    'เกินกำหนดชำระ': { color: '#c2650a', order: 3 },
    'ชำระแล้ว': { color: '#12b886', order: 4 },
    'ชำระบางส่วน': { color: '#0f9c8f', order: 5 },
    'เปลี่ยนภาพพักหน้าจอ': { color: '#e0562f', order: 6 },
    'ล็อคเครื่อง': { color: '#e03131', order: 7 },
    'หนี้สงสัยจะสูญ': { color: '#9c1f4a', order: 8 },
    'จำหน่ายชื่อให้บริษัทติดตามหนี้': { color: '#7c5cff', order: 9 },

    'ค้างชำระ ล็อคเครื่องไม่ได้': { color: '#9a4b1f', order: 11 }
  };
  var STATUS_OPTIONS = Object.keys(STATUS_META).sort(function (a, b) { return STATUS_META[a].order - STATUS_META[b].order; });
  var ROW_RENDER_CAP = 500;   // keep the results table snappy on large datasets (export still full)
  var GRADE_COLORS = { A: '#12b886', B: '#f59f00', 'หนี้สงสัยจะสูญ': '#e03131' };
  var GRADE_LABELS = { A: 'เกรด A — ไม่เคยค้างชำระ', B: 'เกรด B — ค้างชำระ 1 งวด', 'หนี้สงสัยจะสูญ': 'หนี้สงสัยจะสูญ — ค้าง ≥2 งวด' };

  // ---------- Helpers ----------
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function hexToRgba(hex, alpha) {
    var h = hex.replace('#', '');
    var r = parseInt(h.substring(0, 2), 16);
    var g = parseInt(h.substring(2, 4), 16);
    var b = parseInt(h.substring(4, 6), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }
  function fmtMoney(n) {
    var v = Number(n || 0);
    if (!isFinite(v)) return '0';
    return v.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }
  function fmtDate(s) {
    if (!s) return '-';
    var d = new Date(s);
    if (isNaN(d.getTime())) return String(s);
    var dd = String(d.getDate()).padStart(2, '0');
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    return dd + '/' + mm + '/' + d.getFullYear();
  }
  function buildConicGradient(segments) {
    var acc = 0;
    var parts = segments.map(function (s) {
      var start = acc;
      acc += s.pct;
      return s.color + ' ' + start.toFixed(2) + '% ' + acc.toFixed(2) + '%';
    });
    return 'conic-gradient(' + parts.join(', ') + ')';
  }
  function computeStatus(inst, cfg) {
    var due = new Date(inst.dueDate);
    var amountDue = Number(inst.amountDue || 0);
    var amountPaid = Number(inst.amountPaid || 0);
    if (amountDue > 0 && amountPaid >= amountDue - 0.01) return 'ชำระแล้ว';
    if (amountPaid > 0) return 'ชำระบางส่วน';
    if (isNaN(due.getTime())) return 'ยังไม่ถึงกำหนดชำระ';
    var today = new Date();
    var todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    var dueMid = new Date(due.getFullYear(), due.getMonth(), due.getDate());
    var diffDays = Math.round((todayMid - dueMid) / 86400000);
    if (diffDays < 0) return 'ยังไม่ถึงกำหนดชำระ';
    if (diffDays === 0) return 'ถึงกำหนดชำระ';
    if (diffDays >= cfg.lockDays) return 'ล็อคเครื่อง';
    if (diffDays >= cfg.screenDays) return 'เปลี่ยนภาพพักหน้าจอ';
    if (diffDays === 1) return 'ค้างชำระ';
    return 'เกินกำหนดชำระ';
  }

  // ---------- Mock data ----------
  function mk(no, dueDate, amountDue, amountPaid, paidDate, status, override) {
    return {
      no: no, dueDate: dueDate, amountDue: amountDue, amountPaid: amountPaid || 0,
      paidDate: paidDate || '', status: status || '', statusOverride: !!override, discount: 0, note: ''
    };
  }
  function generateMock() {
    return [
      { customerId: 'C001', customerName: 'สมชาย ใจดี', orderId: 'O-2026-001', age: 34, contractDate: '2026-01-09', productList: 'iPhone 15 128GB สีดำ', downPayment: 3000, discount: 500, purchaseType: 'ผ่อนชำระรายเดือน',
        installments: [ mk(1,'2026-02-09',1500,1500,'2026-02-08'), mk(2,'2026-03-09',1500,1500,'2026-03-08'), mk(3,'2026-04-09',1500,1500,'2026-04-08'), mk(4,'2026-05-09',1500,1500,'2026-05-08'), mk(5,'2026-06-09',1500,1500,'2026-06-08'), mk(6,'2026-07-09',1500,0,'') ] },
      { customerId: 'C002', customerName: 'วรรณา สุขใจ', orderId: 'O-2026-002', age: 29, contractDate: '2026-02-01', productList: 'โน้ตบุ๊ค Asus Vivobook 15', downPayment: 5000, discount: 0, purchaseType: 'ผ่อนชำระ 0%',
        installments: [ mk(1,'2026-03-07',2000,2000,'2026-03-06'), mk(2,'2026-04-07',2000,2000,'2026-04-06'), mk(3,'2026-05-07',2000,2000,'2026-05-06'), mk(4,'2026-06-07',2000,2000,'2026-06-06'), mk(5,'2026-07-07',2000,0,''), mk(6,'2026-08-07',2000,0,''), mk(7,'2026-09-07',2000,0,''), mk(8,'2026-10-07',2000,0,'') ] },
      { customerId: 'C003', customerName: 'อนุชา มั่งมี', orderId: 'O-2026-003', age: 45, contractDate: '2025-12-01', productList: 'ตู้เย็น Samsung 16 คิว', downPayment: 2000, discount: 200, purchaseType: 'ผ่อนชำระรายเดือน',
        installments: [ mk(1,'2026-01-05',1800,1800,'2026-01-04'), mk(2,'2026-02-05',1800,1800,'2026-02-04'), mk(3,'2026-07-05',1800,0,''), mk(4,'2026-08-05',1800,0,''), mk(5,'2026-09-05',1800,0,'') ] },
      { customerId: 'C003', customerName: 'อนุชา มั่งมี', orderId: 'O-2026-006', age: 45, contractDate: '2026-03-01', productList: 'เครื่องปรับอากาศ Daikin 12000BTU', downPayment: 4000, discount: 0, purchaseType: 'ผ่อนชำระรายเดือน',
        installments: [ mk(1,'2026-04-02',2500,2500,'2026-04-01'), mk(2,'2026-07-02',2500,0,''), mk(3,'2026-08-02',2500,0,''), mk(4,'2026-09-02',2500,0,'') ] },
      { customerId: 'C004', customerName: 'พิมพ์ใจ ดีเลิศ', orderId: 'O-2026-004', age: 52, contractDate: '2026-04-01', productList: 'ทีวี LG 55 นิ้ว 4K', downPayment: 2500, discount: 300, purchaseType: 'ผ่อนชำระรายเดือน',
        installments: [ mk(1,'2026-05-06',1200,1200,'2026-05-05'), mk(2,'2026-06-06',1200,1200,'2026-06-05'), mk(3,'2026-07-06',1200,0,''), mk(4,'2026-08-06',1200,0,''), mk(5,'2026-09-06',1200,0,''), mk(6,'2026-10-06',1200,0,'') ] },
      { customerId: 'C005', customerName: 'ธนวัฒน์ รุ่งเรือง', orderId: 'O-2026-007', age: 22, contractDate: '2026-01-10', productList: 'มือถือ Samsung A54', downPayment: 1500, discount: 0, purchaseType: 'ผ่อนชำระรายเดือน',
        installments: [ mk(1,'2026-02-10',1000,1000,'2026-02-09'), mk(2,'2026-03-10',1000,1000,'2026-03-09'), mk(3,'2026-04-10',1000,0,'','ยกเลิกสัญญา คืนเครื่อง',true), mk(4,'2026-05-10',1000,0,'','ยกเลิกสัญญา คืนเครื่อง',true) ] },
      { customerId: 'C006', customerName: 'สมพงษ์ เจริญลาภ', orderId: 'O-2026-008', age: 60, contractDate: '2025-09-05', productList: 'ตู้เย็น Toshiba 14 คิว', downPayment: 1000, discount: 0, purchaseType: 'ผ่อนชำระ 0%',
        installments: [ mk(1,'2025-10-05',900,900,'2025-10-04'), mk(2,'2025-11-05',900,0,'','จำหน่ายชื่อให้บริษัทติดตามหนี้',true), mk(3,'2025-12-05',900,0,'','จำหน่ายชื่อให้บริษัทติดตามหนี้',true), mk(4,'2026-01-05',900,0,'','จำหน่ายชื่อให้บริษัทติดตามหนี้',true), mk(5,'2026-02-05',900,0,'','จำหน่ายชื่อให้บริษัทติดตามหนี้',true) ] }
    ];
  }

  // ---------- Persistence (localStorage) ----------
  var STORAGE_KEY = 'debtTracker.v1';
  var appliedPaymentKeys = {}; // signature -> true, guards against re-adding the same payment row
  function loadPersisted() {
    try {
      var raw = window.localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var p = JSON.parse(raw);
      if (p && Array.isArray(p.appliedPaymentKeys)) p.appliedPaymentKeys.forEach(function (k) { appliedPaymentKeys[k] = true; });
      return p;
    } catch (e) { return null; }
  }
  function savePersisted() {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify({
        orders: state.orders,
        customerNotes: state.customerNotes,
        appliedPaymentKeys: Object.keys(appliedPaymentKeys),
        savedAt: new Date().toISOString()
      }));
      state.storageError = '';
    } catch (e) {
      // Usually QuotaExceededError: data too big for localStorage (~5MB). Never fail silently —
      // the user would lose everything on refresh without knowing.
      state.storageError = 'ข้อมูลใหญ่เกินกว่าที่เบราว์เซอร์จะเก็บได้ (พื้นที่เต็ม) — ข้อมูลจะหายเมื่อรีเฟรช/ปิดหน้า กรุณาเชื่อมฐานข้อมูลกลาง (Supabase) หรือลดขนาดไฟล์';
    }
    scheduleCloudSave();
  }
  function clearPersisted() {
    try { window.localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    appliedPaymentKeys = {};
  }
  var persisted = loadPersisted();

  // ========================================================================
  // SHARED CLOUD SYNC (Supabase) — ตั้งค่า 2 บรรทัดนี้หลังสร้างโปรเจกต์ Supabase
  //   ถ้าเว้นว่าง = ทำงานแบบเก็บในเครื่อง (localStorage) เหมือนเดิม ไม่ต้องใส่รหัส
  // ========================================================================
  var SUPABASE_URL = 'https://mddtfcganbuxzfendgfi.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZHRmY2dhbmJ1eHpmZW5kZ2ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2ODc3NzQsImV4cCI6MjA5OTI2Mzc3NH0.eseoVPBdM9fPOh8J8HyqVsBWCIjtG4eTGCRC1scVsTg';
  var CLOUD_ENABLED = SUPABASE_URL.indexOf('http') === 0 && SUPABASE_ANON_KEY.length > 20;

  var db = null;                 // supabase client
  var cloudConnected = false;    // has get_state succeeded at least once this session
  var myClientId = 'c-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
  var lastServerTs = null;       // updated_at of the last state we know about
  var cloudStatus = CLOUD_ENABLED ? 'connecting' : 'local'; // local|connecting|online|saving|offline
  var cloudSaveTimer = null;
  var cloudPollTimer = null;
  var applyingRemote = false;    // guard: don't re-save while applying a remote snapshot

  function initCloud() {
    if (!CLOUD_ENABLED) return false;
    if (!window.supabase || !window.supabase.createClient) { cloudStatus = 'offline'; return false; }
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } });
    return true;
  }
  function currentPayload() {
    return { orders: state.orders, customerNotes: state.customerNotes, appliedPaymentKeys: Object.keys(appliedPaymentKeys) };
  }
  function applySnapshot(data) {
    if (!data) return;
    applyingRemote = true;
    if (Array.isArray(data.orders)) { state.orders = data.orders; state.isSampleData = data.orders.length === 0 ? state.isSampleData : false; }
    state.customerNotes = data.customerNotes || {};
    appliedPaymentKeys = {};
    (data.appliedPaymentKeys || []).forEach(function (k) { appliedPaymentKeys[k] = true; });
    applyingRemote = false;
  }
  // Connect to the shared cloud state — open access, no password prompt.
  function cloudConnect() {
    return db.rpc('get_state', { pw: '' }).then(function (res) {
      if (res.error) throw res.error;
      cloudConnected = true;
      var row = Array.isArray(res.data) ? res.data[0] : res.data;
      if (row && row.data && (row.data.orders || row.data.customerNotes)) { applySnapshot(row.data); lastServerTs = row.updated_at; }
      else { lastServerTs = row ? row.updated_at : null; cloudSaveNow(); } // first-ever: seed with local data
      cloudStatus = 'online';
      return true;
    });
  }
  function scheduleCloudSave() {
    if (!CLOUD_ENABLED || !db || !cloudConnected || applyingRemote) return;
    if (cloudSaveTimer) clearTimeout(cloudSaveTimer);
    cloudSaveTimer = setTimeout(cloudSaveNow, 600);
  }
  function cloudSaveNow() {
    if (!CLOUD_ENABLED || !db || !cloudConnected) return;
    cloudStatus = 'saving'; updateCloudStatus();
    db.rpc('save_state', { pw: '', payload: currentPayload(), client_id: myClientId }).then(function (res) {
      if (res.error) { cloudStatus = 'offline'; }
      else { lastServerTs = Array.isArray(res.data) ? res.data[0] : res.data; cloudStatus = 'online'; }
      updateCloudStatus();
    }).catch(function () { cloudStatus = 'offline'; updateCloudStatus(); });
  }
  function cloudPoll() {
    if (!CLOUD_ENABLED || !db || !cloudConnected) return;
    db.rpc('get_state', { pw: '' }).then(function (res) {
      if (res.error) { cloudStatus = 'offline'; updateCloudStatus(); return; }
      var row = Array.isArray(res.data) ? res.data[0] : res.data;
      if (!row) return;
      if (row.updated_at !== lastServerTs && row.updated_by !== myClientId) {
        applySnapshot(row.data); lastServerTs = row.updated_at;
        cloudStatus = 'online'; render();
      } else { if (cloudStatus === 'offline') cloudStatus = 'online'; updateCloudStatus(); }
    }).catch(function () { cloudStatus = 'offline'; updateCloudStatus(); });
  }
  var CLOUD_POLL_MS = Number(window.DEBT_TRACKER_POLL_MS) || 12000;
  function startCloudPolling() {
    if (cloudPollTimer) clearInterval(cloudPollTimer);
    cloudPollTimer = setInterval(cloudPoll, CLOUD_POLL_MS);
  }

  // ---------- State ----------
  var state = {
    orders: (persisted && persisted.orders && persisted.orders.length) ? persisted.orders : generateMock(),
    query: '',
    selectedCustomerId: null,
    uploadMsgDebt: '',
    uploadMsgPayment: '',
    view: 'dashboard',
    dueMonth: 7,
    dueYear: 2026,
    showCancelledDetail: false,
    showSoldDetail: false,
    showFilters: true,
    filterAccountStatus: 'all',
    filterDueStatus: 'all',
    filterPaymentStatus: 'all',
    filterCrmStatus: 'all',
    filterGrade: 'all',
    dueFrom: '', dueTo: '', paidFrom: '', paidTo: '',
    customerNotes: (persisted && persisted.customerNotes) || {},
    lastSavedAt: (persisted && persisted.savedAt) || '',
    isSampleData: !(persisted && persisted.orders && persisted.orders.length),
    searched: false,
    storageError: '',
    customerNoteDraft: '',
    appliedQuery: '',
    appliedAccountStatus: 'all',
    appliedDueStatus: 'all',
    appliedPaymentStatus: 'all',
    appliedGrade: 'all',
    appliedDueFrom: '', appliedDueTo: '', appliedPaidFrom: '', appliedPaidTo: ''
  };

  // ---------- Derivations ----------
  // Deriving every installment is expensive on large datasets (100k+ rows) and render() runs on
  // every tab switch / filter change. Cache on the identity of state.orders — all mutations
  // replace the array, so a stale hit is impossible.
  var _ordersCache = { ref: null, val: null };
  function computeOrders() {
    if (_ordersCache.ref === state.orders) return _ordersCache.val;
    var out = computeOrdersUncached();
    _ordersCache = { ref: state.orders, val: out };
    return out;
  }
  function computeOrdersUncached() {
    return state.orders.map(function (o) {
      var installments = o.installments.map(function (i) {
        var status = ((i.statusOverride || !AUTO_STATUS_ENABLED) && i.status) ? i.status : computeStatus(i, CFG);
        var m = STATUS_META[status] || { color: '#94a3b8' };
        return Object.assign({}, i, {
          effectiveStatus: status,
          statusColor: m.color,
          statusSoft: hexToRgba(m.color, 0.13),
          statusBorder: hexToRgba(m.color, 0.4)
        });
      });
      var totalDue = installments.reduce(function (s, i) { return s + Number(i.amountDue || 0); }, 0);
      var totalPaid = installments.reduce(function (s, i) { return s + Number(i.amountPaid || 0); }, 0);
      var totalOutstanding = Math.max(0, totalDue - totalPaid - Number(o.discount || 0));
      var isCancelled = installments.some(function (i) { return i.effectiveStatus === 'ยกเลิกสัญญา คืนเครื่อง'; });

    var donutTotal = paidSum + overdueSum + cancelledSum + soldSum + notDueSum;
    var rawSegs = [
      { label: 'ยอดชำระแล้ว', color: '#4f7cff', amount: paidSum },
      { label: 'ค้างชำระ', color: '#e03131', amount: overdueSum },

    var gradeDonut = { conic: buildConicGradient(gradeDonutSegs), segments: gradeDonutSegs.map(function (s) { return Object.assign({}, s, { pctDisp: s.pct.toFixed(1) }); }) };

  function computeView() {

    var filteredOrders = q ? computedOrders.filter(function (o) {

        o.customerName.toLowerCase().indexOf(q) !== -1 ||

    }) : computedOrders;

    if (f.filterAccountStatus !== 'all') {

        if (f.filterAccountStatus === 'cancelled') return o.isCancelled;

        if (f.filterDueStatus === 'notdue') return i.effectiveStatus === 'ยังไม่ถึงกำหนดชำระ';
        if (f.filterDueStatus === 'due_today') return i.effectiveStatus === 'ถึงกำหนดชำระ';
        if (f.filterDueStatus === 'overdue') return LATE_STATUSES.indexOf(i.effectiveStatus) !== -1;
        return true;

    if (f.filterPaymentStatus !== 'all') {

    }

    if (!window.XLSX) { state.uploadMsgPayment = 'ไม่พบไลบรารีอ่านไฟล์ กรุณาลองใหม่'; render(); return; }
    var ALIASES = {
      orderId: ['คำสั่งซื้อ', 'orderid', 'order id', 'order no', 'orderno', 'เลขที่คำสั่งซื้อ', 'หมายเลขคำสั่งซื้อ', 'เลขคำสั่งซื้อ', 'so', 'so number', 'sonumber', 'เลขที่ so', 'เลขที่เอกสาร', 'เลขที่ใบสั่งขาย', 'เลขที่สัญญา', 'เลขสัญญา', 'เลขที่บิล'],
      installmentNo: ['งวดที่', 'installmentno', 'installment', 'installment no', 'งวด', 'งวดที่ชำระ', 'เลขงวด'],
      amountPaid: ['ยอดที่ชำระจริง', 'amountpaid', 'amount paid', 'ยอดชำระจริง', 'ยอดชำระ', 'จำนวนเงินที่ชำระ', 'ยอดรับชำระ', 'รับชำระ'],
      paidDate: ['วันที่ชำระ', 'paiddate', 'paid date', 'วันชำระ', 'วันที่รับชำระ', 'วันรับชำระ'],
      status: ['สถานะการชำระเงิน', 'status', 'สถานะ', 'สถานะการชำระ'],
      discount: ['ส่วนลด', 'discount'],
      note: ['หมายเหตุ', 'note', 'remark', 'remarks']
    };
    readRows(file).then(function (rows) {
      var headers = rows.length ? Object.keys(rows[0]) : [];
      var added = 0, missed = 0, duplicate = 0, updatedOnly = 0;
      var orders = state.orders.map(function (o) { return Object.assign({}, o, { installments: o.installments.map(function (i) { return Object.assign({}, i); }) }); });
      rows.forEach(function (r) {
        var orderId = String(resolveField(r, ALIASES.orderId) || '').trim();
        var no = Number(resolveField(r, ALIASES.installmentNo) || 0);
        var order = orders.find(function (o) { return o.orderId === orderId; });
        var inst = order && order.installments.find(function (i) { return i.no === no; });
        if (!inst) { missed++; return; }
        var amountPaid = resolveField(r, ALIASES.amountPaid);
        var paidDate = resolveField(r, ALIASES.paidDate);
        var status = resolveField(r, ALIASES.status);
        var discount = resolveField(r, ALIASES.discount);
        var note = resolveField(r, ALIASES.note);

        // ACCUMULATE the paid amount onto the running total, with duplicate-row protection.
        if (amountPaid !== '') {
          var payKey = orderId + '|' + no + '|' + toDateString(paidDate) + '|' + toNumber(amountPaid);
          if (appliedPaymentKeys[payKey]) { duplicate++; return; } // same row already added before → skip
          appliedPaymentKeys[payKey] = true;
          inst.amountPaid = toNumber(inst.amountPaid) + toNumber(amountPaid);
          added++;
        } else {
          updatedOnly++;
        }
        if (paidDate !== '') inst.paidDate = toDateString(paidDate); // latest payment date wins
        if (discount !== '') inst.discount = toNumber(discount);
        if (note !== '') inst.note = String(note);
        if (status !== '') { inst.status = String(status); inst.statusOverride = true; }
      });
      // Nothing matched at all (not even duplicates) → likely wrong columns OR debtor not imported yet.
      if (added === 0 && updatedOnly === 0 && duplicate === 0) {
        state.uploadMsgPayment = '⚠️ อ่านไฟล์ได้ ' + rows.length + ' แถว แต่จับคู่กับข้อมูลลูกหนี้ไม่ได้ (ยังไม่บันทึก) — '
          + (state.orders.length === 0 ? 'ยังไม่มีข้อมูลลูกหนี้ในระบบ กรุณาอัปโหลด “ไฟล์ลูกหนี้” ก่อน' : ('ตรวจว่าคอลัมน์ “คำสั่งซื้อ” และ “งวดที่” ตรงกับไฟล์ลูกหนี้ — หัวคอลัมน์ในไฟล์นี้คือ: ' + (headers.length ? headers.join(' | ') : '(ไม่พบหัวคอลัมน์)')));
        render();
        return;
      }
      state.orders = orders;
      if (added || updatedOnly) state.isSampleData = false;
      savePersisted();
      state.uploadMsgPayment = 'บวกยอดสำเร็จ ' + added + ' งวด'
        + (updatedOnly ? (' · อัปเดตข้อมูลอื่น ' + updatedOnly + ' แถว') : '')
        + (duplicate ? (' · ข้ามแถวซ้ำ ' + duplicate + ' แถว (บวกไปแล้ว)') : '')
        + (missed ? (' · ไม่พบ ' + missed + ' แถว') : '');
      render();
    }).catch(function (err) { state.uploadMsgPayment = 'เกิดข้อผิดพลาด: ' + err.message; render(); });
  }

        '</tr></thead><tbody>' +
          CV.filteredOrders.slice(0, ROW_RENDER_CAP).map(function (order) {
            return '<tr data-action="selectCustomer" data-cid="' + esc(order.customerId) + '" style="cursor:pointer; font-size:14px; color:#2b2540; border-top:1px solid rgba(124,92,255,0.10);">' +

        (CV.filteredOrders.length > ROW_RENDER_CAP

        '<div style="flex:1; min-width:0;"><div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;"><div style="font-family:\'Prompt\',sans-serif; font-weight:700; font-size:19px; color:#2b2540;">' + esc(CV.selectedCustomerName) + '</div><div style="background:' + CV.selectedCustomerGradeColor + '1a; color:' + CV.selectedCustomerGradeColor + '; padding:3px 12px; border-radius:20px; font-size:12px; font-weight:700;">' + esc(CV.selectedCustomerGradeLabel) + '</div></div><div style="font-size:13px; color:#6b6785; margin-top:4px;">รหัสลูกค้า: ' + esc(CV.selectedCustomerIdDisp) + ' <span style="margin:0 6px;">·</span> พบ ' + CV.billCount + ' บิล</div></div>' +

      '<div><div style="font-size:12px; color:#6b6785; margin-bottom:6px;">สถานะการชำระเงิน</div><div style="display:flex; align-items:center; gap:6px;">' +

  // ---------- Sidebar (static shell) ----------

  // ---------- Render ----------
  function updateTabStyles() {
    var tabs = [['tab-dashboard', 'dashboard'], ['tab-tracking', 'tracking'], ['tab-upload', 'upload']];
    tabs.forEach(function (t) {
      var el = document.getElementById(t[0]);
      if (!el) return;
      var active = state.view === t[1];
      el.style.color = active ? '#7c5cff' : '#6b6785';
      el.style.background = active ? 'rgba(124,92,255,0.12)' : 'transparent';
    });
  }
  function render() {
    CV = computeView();
    var inner = document.getElementById('main-inner');
    if (state.view === 'upload') inner.innerHTML = renderUpload();
    else if (state.view === 'tracking') inner.innerHTML = renderTracking();
    else inner.innerHTML = renderDashboard();
    updateTabStyles();
  }

  // ---------- Event delegation ----------
  function initEvents() {
    var app = document.getElementById('app');

    app.addEventListener('click', function (e) {
      var t = e.target.closest('[data-action]');
      if (!t) return;
      var a = t.getAttribute('data-action');
      switch (a) {
        case 'goDashboard': state.view = 'dashboard'; render(); break;
        case 'goTracking': state.view = 'tracking'; render(); break;
        case 'goUpload': state.view = 'upload'; render(); break;
        case 'toggleFilters': state.showFilters = !state.showFilters; render(); break;
        case 'performSearch': performSearch(); break;
        case 'clearAllFilters': clearAllFilters(); break;
        case 'clearQuery': state.query = ''; render(); break;
        case 'exportCsv': exportFilteredCsv(CV.filteredOrders); break;
        case 'downloadTemplate': downloadTemplate(t.getAttribute('data-type')); break;
        case 'clearToEmpty': if (window.confirm('ล้างข้อมูลทั้งหมดเพื่อเริ่มจากว่างเปล่า (พร้อมอัปโหลดข้อมูลจริง)?\n(ยกเลิกไม่ได้)')) resetAllData(false); break;
        case 'resetToSample': if (window.confirm('ล้างข้อมูลทั้งหมด และกลับไปเป็นข้อมูลตัวอย่าง?\n(ยกเลิกไม่ได้)')) resetAllData(true); break;
        case 'toggleCancelledDetail': state.showCancelledDetail = !state.showCancelledDetail; render(); break;
        case 'toggleSoldDetail': state.showSoldDetail = !state.showSoldDetail; render(); break;
        case 'selectCustomer': selectCustomer(t.getAttribute('data-cid')); break;
        case 'closeDetail': state.selectedCustomerId = null; render(); break;
        case 'saveNote': saveCustomerNote(); break;
        case 'resetOverride': resetOverride(t.getAttribute('data-order'), Number(t.getAttribute('data-no'))); break;
      }
    });

    // Live typing in the search box: update state without a full re-render (keeps focus)
    app.addEventListener('input', function (e) {
      var t = e.target;
      if (t.getAttribute && t.getAttribute('data-action') === 'queryInput') {
        state.query = t.value;
        var btn = document.getElementById('clearQueryBtn');
        if (btn) btn.style.display = t.value ? 'block' : 'none';
      }
    });

    app.addEventListener('keydown', function (e) {
      var t = e.target;
      if (t.getAttribute && t.getAttribute('data-action') === 'queryInput' && e.key === 'Enter') {
        state.query = t.value;
        performSearch();
      }
    });

    app.addEventListener('change', function (e) {
      var t = e.target;
      if (!t.getAttribute) return;
      var field = t.getAttribute('data-field');
      if (field) {
        updateInstallment(t.getAttribute('data-order'), Number(t.getAttribute('data-no')), field, t.value);
        return;
      }
      var a = t.getAttribute('data-action');
      switch (a) {
        case 'queryInput': state.query = t.value; break;
        case 'noteDraft': state.customerNoteDraft = t.value; break;
        case 'filter': state[t.getAttribute('data-key')] = t.value; render(); break;
        case 'dueMonth': state.dueMonth = Number(t.value); render(); break;
        case 'dueYear': state.dueYear = Number(t.value); render(); break;
        case 'onDebtFile': onDebtFileChange(t.files[0]); t.value = ''; break;
        case 'onPaymentFile': onPaymentFileChange(t.files[0]); t.value = ''; break;
      }
    });
  }

  // ---------- Cloud status pill ----------
  function cloudStatusPillInner() {
    var map = {
      local:      { c: '#12b886', bg: 'rgba(18,184,134,0.08)', t: 'ข้อมูลพร้อมใช้งาน', pulse: true },
      connecting: { c: '#8a86a3', bg: 'rgba(138,134,163,0.10)', t: 'กำลังเชื่อมต่อ…', pulse: false },
      online:     { c: '#12b886', bg: 'rgba(18,184,134,0.08)', t: 'ซิงก์ข้อมูลร่วม (ออนไลน์)', pulse: true },
      saving:     { c: '#c2650a', bg: 'rgba(240,140,0,0.10)', t: 'กำลังบันทึก…', pulse: false },
      offline:    { c: '#e03131', bg: 'rgba(224,49,49,0.08)', t: 'ออฟไลน์ — จะบันทึกเมื่อกลับมา', pulse: false }
    };
    var m = map[cloudStatus] || map.local;
    return '<div style="display:flex; gap:8px; align-items:center; font-size:12px; color:#6b6785; background:' + m.bg + '; padding:10px 14px; border-radius:12px;">' +
      '<div style="width:8px;height:8px;border-radius:50%;background:' + m.c + ';' + (m.pulse ? ' animation:softPulse 2s ease-in-out infinite;' : '') + ' flex-shrink:0;"></div> ' + m.t + '</div>';
  }
  function updateCloudStatus() {
    var el = document.getElementById('cloudStatusPill');
    if (el) el.innerHTML = cloudStatusPillInner();
  }

  // ---------- Boot ----------
  buildShell();
  initEvents();
  render();
  if (CLOUD_ENABLED && initCloud()) {
    // Open access — connects straight to the shared cloud state, no login step.
    cloudConnect().then(function () { render(); updateCloudStatus(); startCloudPolling(); })
      .catch(function () { cloudStatus = 'offline'; updateCloudStatus(); });
  }
})();
</script>
</body>
</html>
