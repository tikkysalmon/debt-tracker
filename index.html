<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบติดตามหนี้และผ่อนชำระ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
  html, body { margin: 0; }
  body { font-family:'Noto Sans Thai', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(124,92,255,0.35); border-radius: 8px; }
  input::placeholder { color: #a39dc2; }

  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes softPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(18,184,134,0.4); } 50% { box-shadow: 0 0 0 7px rgba(18,184,134,0); } }
  @keyframes floatBlobA { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-18px,22px) scale(1.06); } }
  @keyframes floatBlobB { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-16px) scale(1.05); } }
  @keyframes barShimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  *, *::before, *::after { transition: background-color .2s ease, box-shadow .2s ease, transform .2s ease, border-color .2s ease, opacity .2s ease, color .2s ease, filter .2s ease; }

  [style*="cursor:pointer"]:hover { opacity: 0.86; }
  [style*="linear-gradient(135deg,#7c5cff"]:hover { filter: brightness(1.08); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(124,92,255,0.45) !important; }
  [style*="border-left:4px solid"]:hover, [style*="border-left:3px solid"]:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(43,37,64,0.14) !important; }
  [style*="backdrop-filter:blur"]:hover { box-shadow: 0 14px 36px rgba(124,92,255,0.16) !important; }
  [style*="conic-gradient"]:hover { transform: scale(1.03); filter: drop-shadow(0 10px 22px rgba(124,92,255,0.18)); }
  [style*="linear-gradient(180deg,#e0562f"]:hover { transform: translateY(-4px) scaleY(1.04); filter: drop-shadow(0 6px 14px rgba(224,49,49,0.35)); }
  button:hover { filter: brightness(1.06); }
  select:hover, input[type="text"]:hover, input[type="number"]:hover, input[type="date"]:hover { border-color: rgba(124,92,255,0.5) !important; }
  select:focus, input:focus { outline: 2px solid rgba(124,92,255,0.3); outline-offset: 1px; box-shadow: 0 0 0 4px rgba(124,92,255,0.1); }
  tr[data-action="selectCustomer"]:hover { background:rgba(124,92,255,0.06); }
  tr[data-inst-row]:hover { background:rgba(124,92,255,0.045); }
  tr[data-inst-row]:nth-child(even) { background:rgba(124,92,255,0.02); }
  tr[data-inst-row] input, tr[data-inst-row] select { transition: box-shadow .15s ease, border-color .15s ease; }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
(function () {
  // ---------- Config (from design props) ----------
  var CFG = { screenDays: 3, lockDays: 5 };
  var AUTO_STATUS_ENABLED = true;

  // ---------- Dataset (ลูกหนี้ปัจจุบัน vs ลูกหนี้เก่าก่อน 1/10/2025) ----------
  // Deliberately a URL param + full page load, not an in-place hot-swap — this app keeps a LOT of
  // state (filters, caches, cloud-sync timers, selected customer, etc.) that all assume "the
  // dataset" never changes underneath them mid-session. A full reload re-runs the entire existing
  // boot sequence fresh and correctly for whichever dataset is selected, at the cost of a reload
  // when switching — an acceptable trade since staff pick one dataset and work in it, not toggle
  // every few seconds. Two completely separate Supabase files/localStorage keys keep the datasets
  // from ever mixing.
  var DATASET_ID = /[?&]dataset=old\b/.test(window.location.search) ? 'old' : 'current';
  var IS_OLD_DATASET = DATASET_ID === 'old';

  // ---------- Constants ----------
  var LATE_STATUSES = ['ค้างชำระ', 'เกินกำหนดชำระ', 'เปลี่ยนภาพพักหน้าจอ', 'ล็อคเครื่อง', 'ค้างชำระ ล็อคเครื่องไม่ได้', 'หนี้สงสัยจะสูญ', 'ชำระบางส่วน'];
  var NOTDUE_STATUSES = ['ยังไม่ถึงกำหนดชำระ', 'ถึงกำหนดชำระ'];
  var AGE_BUCKETS = [[12, 14], [15, 17], [18, 25], [26, 30], [31, 35], [36, 40], [41, 45], [46, 50], [51, 55], [56, 60], [61, 200]];
  var MONTH_LABELS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
  var STATUS_META = {
    'ยังไม่ถึงกำหนดชำระ': { color: '#748199', order: 0 },
    'ถึงกำหนดชำระ': { color: '#4f7cff', order: 1 },
    'ค้างชำระ': { color: '#c99a00', order: 2 },
    'เกินกำหนดชำระ': { color: '#c2650a', order: 3 },
    'ชำระแล้ว': { color: '#12b886', order: 4 },
    'ชำระบางส่วน': { color: '#0f9c8f', order: 5 },
    'เปลี่ยนภาพพักหน้าจอ': { color: '#e0562f', order: 6 },
    'ล็อคเครื่อง': { color: '#e03131', order: 7 },
    'หนี้สงสัยจะสูญ': { color: '#9c1f4a', order: 8 },
    'จำหน่ายชื่อให้บริษัทติดตามหนี้': { color: '#7c5cff', order: 9 },
    'ยกเลิกสัญญา คืนเครื่อง': { color: '#4b5563', order: 10 },
    'ค้างชำระ ล็อคเครื่องไม่ได้': { color: '#9a4b1f', order: 11 }
  };
  var STATUS_OPTIONS = Object.keys(STATUS_META).sort(function (a, b) { return STATUS_META[a].order - STATUS_META[b].order; });
  // Grouping for the dashboard's "แยกสถานะการชำระ" widget only — every other place in the app
  // (filters, tables, exports) still uses the raw STATUS_META statuses untouched.
  var STATUS_GROUP_META = [
    { label: 'ยังไม่ถึงกำหนดชำระ', color: '#748199', icon: '⏳', statuses: ['ยังไม่ถึงกำหนดชำระ'] },
    { label: 'ถึงกำหนดชำระ', color: '#4f7cff', icon: '📅', statuses: ['ถึงกำหนดชำระ'] },
    { label: 'ชำระแล้ว', color: '#12b886', icon: '✅', statuses: ['ชำระแล้ว', 'ชำระบางส่วน'] },
    { label: 'ค้างชำระ', color: '#e03131', icon: '⚠️', statuses: ['ค้างชำระ', 'เกินกำหนดชำระ', 'ล็อคเครื่อง', 'เปลี่ยนภาพพักหน้าจอ', 'ค้างชำระ ล็อคเครื่องไม่ได้'] },
    { label: 'หนี้สงสัยจะสูญ', color: '#9c1f4a', icon: '🚫', statuses: ['หนี้สงสัยจะสูญ'] },
    { label: 'จำหน่ายชื่อให้บริษัทติดตามหนี้', color: '#7c5cff', icon: '📤', statuses: ['จำหน่ายชื่อให้บริษัทติดตามหนี้'] },
    { label: 'ยกเลิกสัญญา คืนเครื่อง', color: '#4b5563', icon: '↩️', statuses: ['ยกเลิกสัญญา คืนเครื่อง'] }
  ];
  var STATUS_TO_GROUP = {};
  STATUS_GROUP_META.forEach(function (g) { g.statuses.forEach(function (s) { STATUS_TO_GROUP[s] = g.label; }); });
  // computeStatus() can only ever derive these 4 — a collections/business decision, never a fact
  // computable from amountDue/amountPaid/dueDate. Only THESE may set statusOverride=true from an
  // import; every other status is something computeStatus recomputes correctly on its own the
  // moment amountPaid/amountDue changes, so freezing it would just make it go stale forever (this
  // is what made ยอดชำระ/วันที่ชำระ keep updating from later payment files while สถานะ never moved
  // off whatever a one-time historical import last recorded).
  var MANUAL_ONLY_STATUSES = { 'หนี้สงสัยจะสูญ': true, 'จำหน่ายชื่อให้บริษัทติดตามหนี้': true, 'ยกเลิกสัญญา คืนเครื่อง': true, 'ค้างชำระ ล็อคเครื่องไม่ได้': true };
  var GRADE_COLORS = { A: '#12b886', B: '#f59f00', 'หนี้สงสัยจะสูญ': '#e03131' };
  var GRADE_LABELS = { A: 'เกรด A — ไม่เคยค้างชำระ', B: 'เกรด B — ค้างชำระ 1 งวด', 'หนี้สงสัยจะสูญ': 'หนี้สงสัยจะสูญ — ค้าง ≥2 งวด' };
  // Purchase types come straight from whatever the debtor file actually has (e.g. "ผ่อนชำระ 0%")
  // rather than a fixed list — real data has more variants than any hardcoded set would cover.
  function getPurchaseTypeOptions() {
    var seen = {}, out = [];
    state.orders.forEach(function (o) {
      var t = o.purchaseType;
      if (t && !seen[t]) { seen[t] = true; out.push(t); }
    });
    return out.sort();
  }

  // ---------- Helpers ----------
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function hexToRgba(hex, alpha) {
    var h = hex.replace('#', '');
    var r = parseInt(h.substring(0, 2), 16);
    var g = parseInt(h.substring(2, 4), 16);
    var b = parseInt(h.substring(4, 6), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }
  function fmtMoney(n) {
    var v = Number(n || 0);
    if (!isFinite(v)) return '0.00';
    return v.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtDate(s) {
    if (!s) return '-';
    var d = new Date(s);
    if (isNaN(d.getTime())) return String(s);
    var dd = String(d.getDate()).padStart(2, '0');
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    return dd + '/' + mm + '/' + d.getFullYear();
  }
  function buildConicGradient(segments) {
    var acc = 0;
    var parts = segments.map(function (s) {
      var start = acc;
      acc += s.pct;
      return s.color + ' ' + start.toFixed(2) + '% ' + acc.toFixed(2) + '%';
    });
    return 'conic-gradient(' + parts.join(', ') + ')';
  }
  // "ผ่อนเครื่อง"-style purchases (installment-based) show cumulative paid instead of a down
  // payment; "ดาวน์*" types (down payment ± accessories) keep showing ยอดวางดาวน์.
  function isInstallmentPurchaseType(purchaseType) {
    var s = String(purchaseType || '');
    return /ผ่อน/.test(s) && !/ดาวน์/.test(s);
  }
  // "ดาวน์+อุปกรณ์เสริม"-style orders bundle two separate CRM bills into one record: the main
  // device (its own SO) and an accessory (its own SO, different bill, different installment
  // amount/term) — o.accessoryInstallments/accessoryOrderId/accessoryProductList track that
  // second bill so it gets its own table instead of being merged into the device's schedule.
  function isAccessoryBundlePurchaseType(purchaseType) {
    return /อุปกรณ์เสริม/.test(String(purchaseType || ''));
  }
  function computeStatus(inst, cfg) {
    var due = new Date(inst.dueDate);
    var amountDue = Number(inst.amountDue || 0);
    var amountPaid = Number(inst.amountPaid || 0);
    // Net of ส่วนลด — a งวดที่ has ส่วนลด (e.g. a closing discount on an early-settlement งวด) is
    // fully paid once amountPaid covers amountDue MINUS its own discount, not the full amountDue.
    var netDue = Math.max(0, amountDue - Number(inst.discount || 0));
    if (amountDue > 0 && amountPaid >= netDue - 0.01) return 'ชำระแล้ว';
    if (amountPaid > 0) return 'ชำระบางส่วน';
    if (isNaN(due.getTime())) return 'ยังไม่ถึงกำหนดชำระ';
    var today = new Date();
    var todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    var dueMid = new Date(due.getFullYear(), due.getMonth(), due.getDate());
    var diffDays = Math.round((todayMid - dueMid) / 86400000);
    if (diffDays < 0) return 'ยังไม่ถึงกำหนดชำระ';
    if (diffDays === 0) return 'ถึงกำหนดชำระ';
    // cfg.lockDays/screenDays days are a grace COUNT after the due date (เช่น ครบกำหนด 15, นับ 16-20
    // เป็น 5 วัน) — the status only changes on the day AFTER that count finishes (วันที่ 21), hence
    // strictly-greater-than here rather than >=, which would have flipped the status a day early
    // (on the last day still being counted, วันที่ 20).
    if (diffDays > cfg.lockDays) return 'ล็อคเครื่อง';
    if (diffDays > cfg.screenDays) return 'เปลี่ยนภาพพักหน้าจอ';
    if (diffDays === 1) return 'ค้างชำระ';
    return 'เกินกำหนดชำระ';
  }
  // One-time self-heal for data already corrupted by an earlier bug: regular payment-file imports
  // used to write the transaction status ("สำเร็จ") straight into inst.status with statusOverride
  // = true, permanently hiding the real auto-computed status (ชำระแล้ว/ค้างชำระ/etc) — and the
  // "แก้ไขรับชำระ" history-snapshot import did the same for EVERY status it saw, not just the 4
  // that genuinely need to stick (see MANUAL_ONLY_STATUSES). Clears any override that isn't one of
  // those 4, so the status goes back to recomputing live from ยอดชำระ/ยอดผ่อนต่องวด — which is what
  // was silently broken: later payment files kept updating ยอดชำระ/วันที่ชำระ correctly but สถานะ
  // stayed frozen on whatever this bug last recorded. Runs on every load (local + cloud), covers
  // both tracks — cheap no-op once the bad data is gone.
  var _lastRepairChanged = false;
  function repairInvalidStatusOverrides(orders) {
    var changed = false;
    function fixList(list) {
      var touched = false;
      var insts = (list || []).map(function (i) {
        if (i.statusOverride && !MANUAL_ONLY_STATUSES[i.status]) {
          touched = true;
          return Object.assign({}, i, { status: '', statusOverride: false });
        }
        return i;
      });
      return touched ? insts : null;
    }
    var fixed = orders.map(function (o) {
      var mainFix = fixList(o.installments);
      var accFix = fixList(o.accessoryInstallments);
      if (!mainFix && !accFix) return o;
      changed = true;
      var patch = {};
      if (mainFix) patch.installments = mainFix;
      if (accFix) patch.accessoryInstallments = accFix;
      return Object.assign({}, o, patch);
    });
    if (changed) _lastRepairChanged = true;
    return changed ? fixed : orders;
  }
  // One-time self-heal for ดาวน์+อุปกรณ์เสริม orders imported before the accessory track existed:
  // their productList is a single "เครื่อง / อุปกรณ์เสริม" string (the old joinText behavior) with
  // accessoryProductList still blank. Splits on the first "/" — main device keeps the part before,
  // the accessory name (never overwriting one staff already typed in) gets the part after.
  function repairAccessoryProductNames(orders) {
    var changed = false;
    var fixed = orders.map(function (o) {
      if (!isAccessoryBundlePurchaseType(o.purchaseType) || o.accessoryProductList) return o;
      var pl = String(o.productList || '');
      var slashIdx = pl.indexOf('/');
      if (slashIdx === -1) return o;
      var mainPart = pl.slice(0, slashIdx).trim();
      var accPart = pl.slice(slashIdx + 1).trim();
      if (!accPart) return o;
      changed = true;
      return Object.assign({}, o, { productList: mainPart, accessoryProductList: accPart });
    });
    if (changed) _lastRepairChanged = true;
    return changed ? fixed : orders;
  }
  // One-time self-heal for orders whose overpayment (e.g. an early full-settlement lump payment
  // recorded against a single งวด) never got carried forward onto later งวด — see
  // cascadeOverpayment() further below for the actual redistribution logic. Runs on every load so
  // data entered before this existed (or via any path that predates it) settles correctly too.
  function repairOverpaidInstallments(orders) {
    var changed = false;
    var fixed = orders.map(function (o) {
      var accessoryList = o.accessoryInstallments || [];
      var mainFix = cascadeOverpayment(o.installments);
      var accFix = cascadeOverpayment(accessoryList);
      if (mainFix === o.installments && accFix === accessoryList) return o;
      changed = true;
      var patch = {};
      if (mainFix !== o.installments) patch.installments = mainFix;
      if (accFix !== accessoryList) patch.accessoryInstallments = accFix;
      return Object.assign({}, o, patch);
    });
    if (changed) _lastRepairChanged = true;
    return changed ? fixed : orders;
  }
  // Built-in demo orderIds from generateMock() below — a freshly-seeded cloud file (first-ever
  // connect on a brand-new dataset, e.g. ?dataset=old) starts out holding these, and a since-fixed
  // bug (see applySnapshot's isSampleData handling) could flip isSampleData to false while this
  // demo data was still the only thing there, causing the NEXT real debtor-file upload to MERGE
  // with rather than replace it — leaving these 7 fake orders sitting alongside real ones forever.
  // Strips them out once real data exists; never touches a dataset that's still pure demo (nothing
  // real uploaded yet — that's the intended first-run experience, not something to "fix").
  var MOCK_ORDER_IDS = { 'O-2026-001': true, 'O-2026-002': true, 'O-2026-003': true, 'O-2026-004': true, 'O-2026-006': true, 'O-2026-007': true, 'O-2026-008': true };
  function repairStaleSampleOrders(orders) {
    var hasMock = false, hasReal = false;
    orders.forEach(function (o) { if (MOCK_ORDER_IDS[o.orderId]) hasMock = true; else hasReal = true; });
    if (!hasMock || !hasReal) return orders;
    _lastRepairChanged = true;
    return orders.filter(function (o) { return !MOCK_ORDER_IDS[o.orderId]; });
  }

  // ---------- Mock data ----------
  function mk(no, dueDate, amountDue, amountPaid, paidDate, status, override) {
    return {
      no: no, dueDate: dueDate, amountDue: amountDue, amountPaid: amountPaid || 0,
      paidDate: paidDate || '', status: status || '', statusOverride: !!override, discount: 0, note: ''
    };
  }
  function generateMock() {
    return [
      { customerId: 'C001', customerName: 'สมชาย ใจดี', orderId: 'O-2026-001', age: 34, contractDate: '2026-01-09', productList: 'iPhone 15 128GB สีดำ', downPayment: 3000, discount: 500, purchaseType: 'ผ่อนชำระรายเดือน',
        installments: [ mk(1,'2026-02-09',1500,1500,'2026-02-08'), mk(2,'2026-03-09',1500,1500,'2026-03-08'), mk(3,'2026-04-09',1500,1500,'2026-04-08'), mk(4,'2026-05-09',1500,1500,'2026-05-08'), mk(5,'2026-06-09',1500,1500,'2026-06-08'), mk(6,'2026-07-09',1500,0,'') ] },
      { customerId: 'C002', customerName: 'วรรณา สุขใจ', orderId: 'O-2026-002', age: 29, contractDate: '2026-02-01', productList: 'โน้ตบุ๊ค Asus Vivobook 15', downPayment: 5000, discount: 0, purchaseType: 'ผ่อนชำระ 0%',
        installments: [ mk(1,'2026-03-07',2000,2000,'2026-03-06'), mk(2,'2026-04-07',2000,2000,'2026-04-06'), mk(3,'2026-05-07',2000,2000,'2026-05-06'), mk(4,'2026-06-07',2000,2000,'2026-06-06'), mk(5,'2026-07-07',2000,0,''), mk(6,'2026-08-07',2000,0,''), mk(7,'2026-09-07',2000,0,''), mk(8,'2026-10-07',2000,0,'') ] },
      { customerId: 'C003', customerName: 'อนุชา มั่งมี', orderId: 'O-2026-003', age: 45, contractDate: '2025-12-01', productList: 'ตู้เย็น Samsung 16 คิว', downPayment: 2000, discount: 200, purchaseType: 'ผ่อนชำระรายเดือน',
        installments: [ mk(1,'2026-01-05',1800,1800,'2026-01-04'), mk(2,'2026-02-05',1800,1800,'2026-02-04'), mk(3,'2026-07-05',1800,0,''), mk(4,'2026-08-05',1800,0,''), mk(5,'2026-09-05',1800,0,'') ] },
      { customerId: 'C003', customerName: 'อนุชา มั่งมี', orderId: 'O-2026-006', age: 45, contractDate: '2026-03-01', productList: 'เครื่องปรับอากาศ Daikin 12000BTU', downPayment: 4000, discount: 0, purchaseType: 'ผ่อนชำระรายเดือน',
        installments: [ mk(1,'2026-04-02',2500,2500,'2026-04-01'), mk(2,'2026-07-02',2500,0,''), mk(3,'2026-08-02',2500,0,''), mk(4,'2026-09-02',2500,0,'') ] },

      var accPaid = accessoryInstallments.reduce(function (s, i) { return s + Number(i.amountPaid || 0); }, 0);
      var mainOutstanding = Math.max(0, mainDue - mainPaid - sumDiscount(installments) - (o._discountAppliedToInstallments ? 0 : Number(o.discount || 0)));
      var accOutstanding = Math.max(0, accDue - accPaid - sumDiscount(accessoryInstallments));
      var totalOutstanding = mainOutstanding + accOutstanding;
      // OR in the sticky wasSold/wasCancelled flags (set the moment a status is ever assigned, in
      // updateInstallment/onPaymentFileChange) so a later ชำระแล้ว on some งวด doesn't make the
      // account-status badge disappear — see stickyAccountStatusPatch for why.
      var isCancelled = !!o.wasCancelled || allInstallments.some(function (i) { return i.effectiveStatus === 'ยกเลิกสัญญา คืนเครื่อง'; });
      var isSold = !!o.wasSold || allInstallments.some(function (i) { return i.effectiveStatus === 'จำหน่ายชื่อให้บริษัทติดตามหนี้'; });
      var overdueCount = allInstallments.filter(function (i) { return ['ชำระแล้ว', 'ยังไม่ถึงกำหนดชำระ', 'ถึงกำหนดชำระ'].indexOf(i.effectiveStatus) === -1; }).length;
      var lateInsts = allInstallments.filter(function (i) { return LATE_STATUSES.indexOf(i.effectiveStatus) !== -1; });
      var lateOutstandingRaw = lateInsts.reduce(function (s, i) { return s + Math.max(0, Number(i.amountDue || 0) - Number(i.amountPaid || 0) - Number(i.discount || 0)); }, 0);
      return Object.assign({}, o, {
        installments: installments,
        accessoryInstallments: accessoryInstallments,
        hasAccessory: isAccessoryBundlePurchaseType(o.purchaseType),
        totalDueRaw: totalDue,
        totalPaidRaw: totalPaid,
        totalOutstandingRaw: totalOutstanding,
        totalPaidFullRaw: Number(o.downPayment || 0) + totalPaid,
        totalContractRaw: Number(o.downPayment || 0) + totalDue,
        totalDueDisp: fmtMoney(totalDue),
        totalPaidDisp: fmtMoney(totalPaid),
        totalOutstandingDisp: fmtMoney(totalOutstanding),
        mainPaidDisp: fmtMoney(mainPaid),
        mainOutstandingRaw: mainOutstanding,
        mainOutstandingDisp: fmtMoney(mainOutstanding),
        accessoryPaidDisp: fmtMoney(accPaid),
        accessoryOutstandingRaw: accOutstanding,
        accessoryOutstandingDisp: fmtMoney(accOutstanding),
        firstInstallmentAmountDisp: fmtMoney(installments[0] ? installments[0].amountDue : 0),
        // ลูกหนี้เก่า only: some records have no real รหัส SO at all — orderId still holds an
        // internal synthetic key (see onDebtFileChange) so the app never mixes them up, but staff
        // should just see "-", never that placeholder value.
        soDisplay: o.soUnknown ? '-' : o.orderId,
        downPaymentDisp: fmtMoney(o.downPayment),
        discountDisp: fmtMoney(o.discount),
        contractDateDisp: fmtDate(o.contractDate),
        overdueCount: overdueCount,
        isCancelled: isCancelled,
        isSold: isSold,
        lateCount: lateInsts.length,
        lateOutstandingRaw: lateOutstandingRaw,
        installmentCount: installments.length,
        accessoryInstallmentCount: accessoryInstallments.length
      });
    });
  }

  function computeDashboard(orders) {
    var activeOrders = orders.filter(function (o) { return !o.isCancelled && !o.isSold; });
    var cancelledOrders = orders.filter(function (o) { return o.isCancelled; });
    var soldOrders = orders.filter(function (o) { return o.isSold; });

    var paidSum = 0, overdueSum = 0, notDueSum = 0, paidInstCount = 0, overdueInstCount = 0, notDueInstCount = 0;
    activeOrders.forEach(function (o) {
      paidSum += o.totalPaidFullRaw;
      o.installments.concat(o.accessoryInstallments || []).forEach(function (i) {
        var outstanding = Math.max(0, Number(i.amountDue || 0) - Number(i.amountPaid || 0) - Number(i.discount || 0));
        if (i.effectiveStatus === 'ชำระแล้ว') paidInstCount++;
        else if (LATE_STATUSES.indexOf(i.effectiveStatus) !== -1) { overdueSum += outstanding; overdueInstCount++; }
        else if (NOTDUE_STATUSES.indexOf(i.effectiveStatus) !== -1) { notDueSum += outstanding; notDueInstCount++; }
      });
    });
    var cancelledSum = cancelledOrders.reduce(function (s, o) { return s + o.totalContractRaw; }, 0);
    var soldSum = soldOrders.reduce(function (s, o) { return s + o.totalContractRaw; }, 0);
    var totalContract = orders.reduce(function (s, o) { return s + o.totalContractRaw; }, 0);
    var netRemaining = Math.max(0, totalContract - paidSum);
    var paidRatePercent = totalContract > 0 ? (paidSum / totalContract * 100) : 0;

    var kpi = {
      totalContractDisp: fmtMoney(totalContract), contractCount: orders.length,
      paidDisp: fmtMoney(paidSum), paidInstCount: paidInstCount,
      netRemainingDisp: fmtMoney(netRemaining),
      overdueDisp: fmtMoney(overdueSum), overdueInstCount: overdueInstCount,
      cancelledDisp: fmtMoney(cancelledSum), cancelledCount: cancelledOrders.length,
      soldDisp: fmtMoney(soldSum), soldCount: soldOrders.length,
      notDueDisp: fmtMoney(notDueSum), notDueInstCount: notDueInstCount,
      paidRatePercent: paidRatePercent.toFixed(1)
    };

    var donutTotal = paidSum + overdueSum + cancelledSum + soldSum + notDueSum;
    var rawSegs = [
      { label: 'ยอดชำระแล้ว', color: '#4f7cff', amount: paidSum },
      { label: 'ค้างชำระ', color: '#e03131', amount: overdueSum },
      { label: 'ยกเลิกสัญญา คืนเครื่อง', color: '#d6336c', amount: cancelledSum },
      { label: 'จำหน่ายชื่อให้บริษัทติดตามหนี้', color: '#f08c00', amount: soldSum },
      { label: 'ยังไม่ถึงกำหนด', color: '#adb5bd', amount: notDueSum }
    ].map(function (s) { return Object.assign({}, s, { pct: donutTotal > 0 ? (s.amount / donutTotal * 100) : 0, amountDisp: fmtMoney(s.amount) }); });
    var paymentDonut = { conic: buildConicGradient(rawSegs), segments: rawSegs.map(function (s) { return Object.assign({}, s, { pctDisp: s.pct.toFixed(1) }); }), totalDisp: fmtMoney(donutTotal) };

    var trendMap = {};
    activeOrders.forEach(function (o) { o.installments.concat(o.accessoryInstallments || []).forEach(function (i) {
      if (LATE_STATUSES.indexOf(i.effectiveStatus) === -1 || !i.dueDate) return;
      var key = i.dueDate.slice(0, 7);
      var outstanding = Math.max(0, Number(i.amountDue || 0) - Number(i.amountPaid || 0) - Number(i.discount || 0));
      trendMap[key] = (trendMap[key] || 0) + outstanding;
    }); });
    var trendKeys = Object.keys(trendMap).sort().slice(-12);
    var trendMax = Math.max.apply(null, [1].concat(trendKeys.map(function (k) { return trendMap[k]; })));
    var monthlyTrend = trendKeys.map(function (k) {
      var parts = k.split('-'), y = parts[0], m = parts[1];
      return { key: k, label: MONTH_LABELS[Number(m) - 1] + ' ' + y.slice(2), amountRaw: trendMap[k], amountDisp: fmtMoney(trendMap[k]), heightPct: Math.max(4, trendMap[k] / trendMax * 100) };
    });

    // Payment-status breakdown by ORDER (ราย), across every customer combined — no month/year
    // scoping, and grouped into the 7 buckets in STATUS_GROUP_META (ชำระแล้ว+ชำระบางส่วน merged;
    // ค้างชำระ+เกินกำหนดชำระ+ล็อคเครื่อง+เปลี่ยนภาพพักหน้าจอ+ค้างชำระล็อคเครื่องไม่ได้ merged).
    // Per the user's own example: an order with 4 installments (2 paid, 1 ค้างชำระ, 1
    // ยังไม่ถึงกำหนดชำระ) counts as 1 ราย under ค้างชำระ AND 1 ราย under ยังไม่ถึงกำหนดชำระ (an
    // order can land in more than one bucket) — but "ชำระแล้ว" only counts orders that are
    // ENTIRELY in the paid group, since a couple of paid installments on an otherwise-open order
    // isn't really "paid" from a collections standpoint.
    var dueGroups = {};
    function ensureDueGroup(g) {
      if (!dueGroups[g]) dueGroups[g] = { orderSet: {}, amount: 0, subOrderSets: {}, subAmounts: {} };
      return dueGroups[g];
    }
    orders.forEach(function (o) {
      // Combine main + accessory (ดาวน์+อุปกรณ์เสริม) installments — a fully-paid device with an
      // overdue accessory bill must NOT show up as "ชำระแล้ว", it's still a real open balance.
      var allInsts = o.installments.concat(o.accessoryInstallments || []);
      var groupsPerInst = allInsts.map(function (i) { return STATUS_TO_GROUP[i.effectiveStatus] || i.effectiveStatus; });
      var allPaid = groupsPerInst.length > 0 && groupsPerInst.every(function (g) { return g === 'ชำระแล้ว'; });
      // Which installments actually count toward a bucket for this order — same exclusion as
      // before: paid/partial installments aren't a "current issue" unless the whole order is paid.
      var inScope = allPaid ? allInsts : allInsts.filter(function (i) { return (STATUS_TO_GROUP[i.effectiveStatus] || i.effectiveStatus) !== 'ชำระแล้ว'; });
      var seenGroup = {}, seenStatus = {};
      inScope.forEach(function (i) {
        var g = STATUS_TO_GROUP[i.effectiveStatus] || i.effectiveStatus;
        var s = i.effectiveStatus;
        if (!seenGroup[g]) { seenGroup[g] = true; ensureDueGroup(g).orderSet[o.orderId] = true; }
        var subKey = g + '|' + s;
        if (!seenStatus[subKey]) {
          seenStatus[subKey] = true;
          var grp = ensureDueGroup(g);
          if (!grp.subOrderSets[s]) grp.subOrderSets[s] = {};
          grp.subOrderSets[s][o.orderId] = true;
        }
      });
      allInsts.forEach(function (i) {
        var outstanding = Math.max(0, Number(i.amountDue || 0) - Number(i.amountPaid || 0) - Number(i.discount || 0));
        var g = STATUS_TO_GROUP[i.effectiveStatus] || i.effectiveStatus;
        var grp = ensureDueGroup(g);
        grp.amount += outstanding;
        grp.subAmounts[i.effectiveStatus] = (grp.subAmounts[i.effectiveStatus] || 0) + outstanding;
      });
    });
    var dueDateBreakdown = STATUS_GROUP_META
      .filter(function (g) { return dueGroups[g.label]; })
      .map(function (g) {
        var grp = dueGroups[g.label];
        var children = g.statuses.length > 1
          ? g.statuses.filter(function (s) { return grp.subOrderSets[s]; }).map(function (s) {
              return { label: s, count: Object.keys(grp.subOrderSets[s]).length, amountDisp: fmtMoney(grp.subAmounts[s] || 0) };
            })
          : [];
        return { label: g.label, count: Object.keys(grp.orderSet).length, amountDisp: fmtMoney(grp.amount), color: g.color, icon: g.icon, children: children };
      });
    var dueDateHasData = dueDateBreakdown.length > 0;

    var gradeBuckets = { A: { count: 0, paid: 0, overdue: 0 }, B: { count: 0, paid: 0, overdue: 0 }, 'หนี้สงสัยจะสูญ': { count: 0, paid: 0, overdue: 0 } };
    activeOrders.forEach(function (o) {
      var g = o.lateCount === 0 ? 'A' : o.lateCount === 1 ? 'B' : 'หนี้สงสัยจะสูญ';
      gradeBuckets[g].count++;
      gradeBuckets[g].paid += o.totalPaidFullRaw;
      gradeBuckets[g].overdue += o.lateOutstandingRaw;
    });
    var gradeTotal = activeOrders.length;
    var gradeCards = ['A', 'B', 'หนี้สงสัยจะสูญ'].map(function (g) {
      return {
        key: g, count: gradeBuckets[g].count, color: GRADE_COLORS[g],
        pct: gradeTotal > 0 ? (gradeBuckets[g].count / gradeTotal * 100).toFixed(1) : '0.0',
        paidDisp: fmtMoney(gradeBuckets[g].paid), overdueDisp: fmtMoney(gradeBuckets[g].overdue),
        barPct: gradeTotal > 0 ? (gradeBuckets[g].count / gradeTotal * 100) : 0
      };
    });
    var gradeDonutSegs = ['A', 'B', 'หนี้สงสัยจะสูญ'].map(function (g) { return { label: g, color: GRADE_COLORS[g], count: gradeBuckets[g].count, pct: gradeTotal > 0 ? (gradeBuckets[g].count / gradeTotal * 100) : 0 }; });
    var gradeDonut = { conic: buildConicGradient(gradeDonutSegs), segments: gradeDonutSegs.map(function (s) { return Object.assign({}, s, { pctDisp: s.pct.toFixed(1) }); }) };

    function buildAgeSummary(minLate) {
      var set = activeOrders.filter(function (o) { return o.lateCount >= minLate; });
      var total = set.length;
      return AGE_BUCKETS.map(function (range) {
        var inRange = set.filter(function (o) { return o.age >= range[0] && o.age <= range[1]; });
        var count = inRange.length;
        var overdueAmt = inRange.reduce(function (s, o) { return s + o.lateOutstandingRaw; }, 0);
        var paidAmt = inRange.reduce(function (s, o) { return s + o.totalPaidFullRaw; }, 0);
        return {
          label: range[0] + (range[1] >= 200 ? '+ ปี' : '-' + range[1] + ' ปี'),
          count: count, pct: total > 0 ? (count / total * 100).toFixed(1) : '0.0',
          overdueDisp: fmtMoney(overdueAmt), paidDisp: fmtMoney(paidAmt)
        };
      }).filter(function (b) { return b.count > 0; });
    }
    var ageOverdueSummary = { total: activeOrders.filter(function (o) { return o.lateCount >= 1; }).length, buckets: buildAgeSummary(1) };
    var ageBadDebtSummary = { total: activeOrders.filter(function (o) { return o.lateCount >= 2; }).length, buckets: buildAgeSummary(2) };

    var ptMap = {};
    orders.forEach(function (o) {
      if (!ptMap[o.purchaseType]) ptMap[o.purchaseType] = { orders: [] };
      ptMap[o.purchaseType].orders.push(o);
    });
    var purchaseTypeGroups = Object.keys(ptMap).map(function (type) {
      var list = ptMap[type].orders;
      var activeList = list.filter(function (o) { return !o.isCancelled && !o.isSold; });
      var cancelledList = list.filter(function (o) { return o.isCancelled; });
      var soldList = list.filter(function (o) { return o.isSold; });
      var contractRaw = list.reduce(function (s, o) { return s + o.totalContractRaw; }, 0);
      var paidRaw = activeList.reduce(function (s, o) { return s + o.totalPaidFullRaw; }, 0);
      var overdueRaw = activeList.reduce(function (s, o) { return s + o.lateOutstandingRaw; }, 0);
      var notDueRaw = activeList.reduce(function (s, o) { return s + o.installments.concat(o.accessoryInstallments || []).filter(function (i) { return NOTDUE_STATUSES.indexOf(i.effectiveStatus) !== -1; }).reduce(function (s2, i) { return s2 + Math.max(0, Number(i.amountDue || 0) - Number(i.amountPaid || 0) - Number(i.discount || 0)); }, 0); }, 0);
      var cancelledRaw = cancelledList.reduce(function (s, o) { return s + o.totalContractRaw; }, 0);
      var soldRaw = soldList.reduce(function (s, o) { return s + o.totalContractRaw; }, 0);
      var gCounts = { A: 0, B: 0, 'หนี้สงสัยจะสูญ': 0 };
      activeList.forEach(function (o) { var g = o.lateCount === 0 ? 'A' : o.lateCount === 1 ? 'B' : 'หนี้สงสัยจะสูญ'; gCounts[g]++; });
      var gTotal = activeList.length;
      var gSegs = ['A', 'B', 'หนี้สงสัยจะสูญ'].map(function (g) { return { label: g, color: GRADE_COLORS[g], count: gCounts[g], pct: gTotal > 0 ? (gCounts[g] / gTotal * 100) : 0 }; });
      return {
        type: type, count: list.length,
        contractDisp: fmtMoney(contractRaw), paidDisp: fmtMoney(paidRaw),
        overdueDisp: fmtMoney(overdueRaw), notDueDisp: fmtMoney(notDueRaw),
        cancelledDisp: fmtMoney(cancelledRaw), soldDisp: fmtMoney(soldRaw),
        gradeDonut: { conic: buildConicGradient(gSegs), segments: gSegs.map(function (s) { return Object.assign({}, s, { pctDisp: s.pct.toFixed(1) }); }) }
      };
    });

    function buildLifecycleSummary(list) {
      var count = list.length;
      var contractRaw = list.reduce(function (s, o) { return s + o.totalContractRaw; }, 0);
      var paidRaw = list.reduce(function (s, o) { return s + o.totalPaidFullRaw; }, 0);
      var remainingRaw = Math.max(0, contractRaw - paidRaw);
      var segs = [
        { label: 'ชำระแล้ว', color: '#4f7cff', amount: paidRaw },
        { label: 'คงเหลือ', color: '#e03131', amount: remainingRaw }
      ].map(function (s) { return Object.assign({}, s, { pct: contractRaw > 0 ? (s.amount / contractRaw * 100) : 0 }); });
      return {
        count: count, contractDisp: fmtMoney(contractRaw), paidDisp: fmtMoney(paidRaw), remainingDisp: fmtMoney(remainingRaw),
        donut: { conic: buildConicGradient(segs), segments: segs.map(function (s) { return Object.assign({}, s, { pctDisp: s.pct.toFixed(1), amountDisp: fmtMoney(s.amount) }); }) },
        orders: list
      };
    }
    var cancelledSummary = buildLifecycleSummary(cancelledOrders);
    var soldSummary = buildLifecycleSummary(soldOrders);

    return {
      kpi: kpi, paymentDonut: paymentDonut, monthlyTrend: monthlyTrend, hasTrendData: monthlyTrend.length > 0,
      dueDateBreakdown: dueDateBreakdown, dueDateHasData: dueDateHasData,
      gradeCards: gradeCards, gradeDonut: gradeDonut, gradeTotal: gradeTotal,
      ageOverdueSummary: ageOverdueSummary, ageBadDebtSummary: ageBadDebtSummary,
      purchaseTypeGroups: purchaseTypeGroups,
      cancelledSummary: cancelledSummary, soldSummary: soldSummary
    };
  }

  function computeView() {
    var computedOrders = computeOrders();

    var q = state.appliedQuery.trim().toLowerCase();
    var f = {
      filterAccountStatus: state.appliedAccountStatus,
      filterDueStatus: state.appliedDueStatus,
      paymentStatusesExcluded: state.appliedPaymentStatuses,
      filterGrade: state.appliedGrade,
      purchaseTypes: state.appliedPurchaseTypes,
      dueFrom: state.appliedDueFrom, dueTo: state.appliedDueTo,
      paidFrom: state.appliedPaidFrom, paidTo: state.appliedPaidTo
    };
    function inRange(dateStr, from, to) {
      if (!dateStr) return false;
      if (from && dateStr < from) return false;
      if (to && dateStr > to) return false;
      return true;
    }
    var filteredOrders = q ? computedOrders.filter(function (o) {
      return o.customerId.toLowerCase().indexOf(q) !== -1 ||
        o.customerName.toLowerCase().indexOf(q) !== -1 ||
        o.orderId.toLowerCase().indexOf(q) !== -1 ||
        (o.accessoryOrderId && o.accessoryOrderId.toLowerCase().indexOf(q) !== -1);
    }) : computedOrders;

    if (f.filterAccountStatus !== 'all') {
      filteredOrders = filteredOrders.filter(function (o) {
        if (f.filterAccountStatus === 'cancelled') return o.isCancelled;
        if (f.filterAccountStatus === 'sold') return o.isSold;
        return !o.isCancelled && !o.isSold;
      });
    }
    // Combine main + accessory (ดาวน์+อุปกรณ์เสริม) installments for every per-installment filter
    // below — an overdue/due-date/status match on the accessory schedule must surface the order
    // too, not just matches on the main device's schedule.
    function allInstsOf(o) { return o.installments.concat(o.accessoryInstallments || []); }
    if (f.filterDueStatus !== 'all') {
      filteredOrders = filteredOrders.filter(function (o) { return allInstsOf(o).some(function (i) {
        if (f.filterDueStatus === 'notdue') return i.effectiveStatus === 'ยังไม่ถึงกำหนดชำระ';
        if (f.filterDueStatus === 'due_today') return i.effectiveStatus === 'ถึงกำหนดชำระ';
        if (f.filterDueStatus === 'overdue') return LATE_STATUSES.indexOf(i.effectiveStatus) !== -1;
        return true;
      }); });
    }
    if (f.paymentStatusesExcluded.length) {
      filteredOrders = filteredOrders.filter(function (o) { return allInstsOf(o).some(function (i) { return f.paymentStatusesExcluded.indexOf(i.effectiveStatus) === -1; }); });
    }
    if (f.filterGrade !== 'all') {
      filteredOrders = filteredOrders.filter(function (o) {
        if (o.isCancelled || o.isSold) return false;
        var g = o.lateCount === 0 ? 'A' : o.lateCount === 1 ? 'B' : 'หนี้สงสัยจะสูญ';
        return g === f.filterGrade;
      });
    }
    if (f.purchaseTypes.length) {
      filteredOrders = filteredOrders.filter(function (o) { return f.purchaseTypes.indexOf(o.purchaseType) === -1; });
    }
    if (f.dueFrom || f.dueTo) {
      filteredOrders = filteredOrders.filter(function (o) { return allInstsOf(o).some(function (i) { return inRange(i.dueDate, f.dueFrom, f.dueTo); }); });
    }
    if (f.paidFrom || f.paidTo) {
      filteredOrders = filteredOrders.filter(function (o) { return allInstsOf(o).some(function (i) { return inRange(i.paidDate, f.paidFrom, f.paidTo); }); });
    }
    // Once the user presses ค้นหา we always show the result table — even with no criteria,
    // where it simply lists every order.
    var hasSearched = state.searched;

    var hasPendingChanges = state.query !== state.appliedQuery ||
      state.filterAccountStatus !== state.appliedAccountStatus ||
      state.filterDueStatus !== state.appliedDueStatus ||
      state.filterPaymentStatuses.join(',') !== state.appliedPaymentStatuses.join(',') ||
      state.filterGrade !== state.appliedGrade ||
      state.filterPurchaseTypes.join(',') !== state.appliedPurchaseTypes.join(',') ||
      state.dueFrom !== state.appliedDueFrom || state.dueTo !== state.appliedDueTo ||
      state.paidFrom !== state.appliedPaidFrom || state.paidTo !== state.appliedPaidTo;

    var selectedCustomerOrders = state.selectedCustomerId ? computedOrders.filter(function (o) { return o.customerId === state.selectedCustomerId; }) : [];
    var hasSelectedCustomer = selectedCustomerOrders.length > 0;
    var selectedCustomerGrade = 'A';
    // ปิดยอด — ยอดคงเหลือรวมทุกบิลของลูกค้าคนนี้เป็น 0 แล้ว (จ่ายครบ/ปิดยอดแล้วทุกสัญญา)
    var selectedCustomerFullySettled = hasSelectedCustomer && selectedCustomerOrders.reduce(function (s, o) { return s + o.totalOutstandingRaw; }, 0) <= 0.005;
    if (hasSelectedCustomer) {
      var activeSel = selectedCustomerOrders.filter(function (o) { return !o.isCancelled && !o.isSold; });
      if (activeSel.some(function (o) { return o.lateCount >= 2; })) selectedCustomerGrade = 'หนี้สงสัยจะสูญ';
      else if (activeSel.some(function (o) { return o.lateCount === 1; })) selectedCustomerGrade = 'B';
    }

    // Only the dashboard view needs these aggregates — computing them for every render costs
    // hundreds of ms once there are 100k+ installments.
    var dashboard = state.view === 'dashboard' ? computeDashboard(computedOrders) : null;

    return {
      computedOrders: computedOrders,
      filteredOrders: filteredOrders,
      noResults: filteredOrders.length === 0,
      resultCount: filteredOrders.length,
      hasSearched: hasSearched,
      notSearched: !hasSearched,
      hasPendingChanges: hasPendingChanges,
      selectedCustomerOrders: selectedCustomerOrders,
      hasSelectedCustomer: hasSelectedCustomer,
      selectedCustomerName: hasSelectedCustomer ? selectedCustomerOrders[0].customerName : '',
      selectedCustomerIdDisp: state.selectedCustomerId || '',
      selectedCustomerGradeLabel: GRADE_LABELS[selectedCustomerGrade],
      selectedCustomerGradeColor: GRADE_COLORS[selectedCustomerGrade],
      selectedCustomerFullySettled: selectedCustomerFullySettled,
      billCount: selectedCustomerOrders.length,
      customerNoteSaved: hasSelectedCustomer ? (state.customerNotes[state.selectedCustomerId] || '') : '',
      dashboard: dashboard
    };
  }

            inst = sortedInsts.find(function (i) { return toNumber(i.amountPaid) < (toNumber(i.amountDue) - toNumber(i.discount) - 0.01); }) || trackList[trackList.length - 1];
          }
          if (!inst) { missed++; return; }
          payKey = orderId + '|noinst|' + String(paidDate) + '|' + toNumber(amountPaid);
        }

        // ACCUMULATE the paid amount onto the running total, with duplicate-row protection.
        // A penalty-tagged row's amount is bigger than the installment actually owes — the
        // excess over what's still due on this installment IS the fee (late fee / unlock fee
        // are fixed at ฿500 each occurrence), no need to already have a "charged" figure on record.
        if (amountPaid !== '') {
          if (appliedPaymentKeys[payKey]) { duplicate++; return; } // same row already added before → skip
          appliedPaymentKeys[payKey] = true;
          var rowAmount = toNumber(amountPaid);
          if (hasPenalty) {
            var dueRemaining = Math.max(0, toNumber(inst.amountDue) - toNumber(inst.discount) - toNumber(inst.amountPaid));
            var penaltyPortion = Math.max(0, rowAmount - dueRemaining);
            var installmentPortion = rowAmount - penaltyPortion;
            inst.amountPaid = toNumber(inst.amountPaid) + installmentPortion;
            if (penaltyPortion > 0) {
              inst.penaltyPaid = toNumber(inst.penaltyPaid) + penaltyPortion;
              // Auto-charge the fixed ฿500/occurrence fee if nothing was manually charged yet
              // (via the เลื่อนวันชำระ button), so the charged-vs-paid cell reads sensibly.
              if (!toNumber(inst.lateFee) && !toNumber(inst.unlockFee)) {
                var occurrences = Math.round(penaltyPortion / 500);
                inst.lateFee = (occurrences >= 1 ? 500 : 0);
                inst.unlockFee = (occurrences >= 2 ? (occurrences - 1) * 500 : 0);
              }
              addedPenalty++;
            }
            if (installmentPortion > 0) added++;
          } else {
            inst.amountPaid = toNumber(inst.amountPaid) + rowAmount;
            added++;
          }
        } else {
          updatedOnly++;
        }
        if (paidDate !== '') inst.paidDate = toDateString(paidDate); // latest payment date wins
        if (discount !== '') inst.discount = toNumber(discount);
        if (note !== '') inst.note = String(note);
        // Regular payment exports tag every row's "สถานะการชำระ" as "สำเร็จ" (the bank/QR
        // transaction succeeded) — that's not a debt-collection status and must NOT override the
        // auto-computed one, or every paid installment gets stuck showing "สำเร็จ" forever instead
        // of "ชำระแล้ว"/"ค้างชำระ"/etc. Only accept values that are real STATUS_META entries.
        if (status !== '' && STATUS_META[String(status)]) {
          inst.status = String(status); inst.statusOverride = !!MANUAL_ONLY_STATUSES[String(status)];
          Object.assign(order, stickyAccountStatusPatch(String(status)));
        }
      });
      // Nothing matched at all (not even duplicates) → likely wrong columns OR debtor not imported yet.
      if (added === 0 && addedPenalty === 0 && updatedOnly === 0 && duplicate === 0) {
        state.uploadMsgPayment = '⚠️ อ่านไฟล์ได้ ' + rows.length + ' แถว แต่จับคู่กับข้อมูลลูกหนี้ไม่ได้ (ยังไม่บันทึก) — '
          + (state.orders.length === 0 ? 'ยังไม่มีข้อมูลลูกหนี้ในระบบ กรุณาอัปโหลด “ไฟล์ลูกหนี้” ก่อน' : ('ตรวจว่าคอลัมน์ “คำสั่งซื้อ” และ “งวดที่” ตรงกับไฟล์ลูกหนี้ — หัวคอลัมน์ในไฟล์นี้คือ: ' + (headers.length ? headers.join(' | ') : '(ไม่พบหัวคอลัมน์)')));
        render();
        return;
      }
      // Carry any resulting overpayment (a lump early-settlement recorded against one งวด)
      // forward onto later งวด — see cascadeOverpayment for why.
      orders = orders.map(function (o) {
        return Object.assign({}, o, { installments: cascadeOverpayment(o.installments), accessoryInstallments: cascadeOverpayment(o.accessoryInstallments || []) });
      });
      state.orders = orders;
      if (added || addedPenalty || updatedOnly) state.isSampleData = false;
      savePersisted();
      state.uploadMsgPayment = 'บวกยอดสำเร็จ ' + added + ' งวด'
        + (addedPenalty ? (' · ค่าปรับ ' + addedPenalty + ' งวด') : '')
        + (updatedOnly ? (' · อัปเดตข้อมูลอื่น ' + updatedOnly + ' แถว') : '')
        + (duplicate ? (' · ข้ามแถวซ้ำ ' + duplicate + ' แถว (บวกไปแล้ว)') : '')
        + (missed ? (' · ไม่พบ ' + missed + ' แถว') : '');
      render();
    }).catch(function (err) { state.uploadMsgPayment = 'เกิดข้อผิดพลาด: ' + err.message; render(); });
  }

  // Shared multi-select filter, collapsed into a single-line dropdown like every other filter in
  // the panel — excludedList holds items UNCHECKED (excluded from results); empty = everything
  // checked/included. Click the trigger to open the checkbox panel; it stays open while checking
  // multiple items and only closes on an outside click (see the click-outside handler in
  // initEvents) or re-clicking the trigger. Used for both ประเภทการซื้อ and สถานะการชำระ.
  function renderChecklistDropdown(filterKey, options, excludedList, toggleAction, toggleAllAction, allLabel) {
    var isOpen = state.openFilterDropdown === filterKey;
    var chk = function (checked) {
      return '<div style="width:16px; height:16px; border-radius:4px; border:1.5px solid ' + (checked ? '#7c5cff' : 'rgba(124,92,255,0.35)') + '; background:' + (checked ? '#7c5cff' : '#fff') + '; display:flex; align-items:center; justify-content:center; flex-shrink:0;">' + (checked ? '<span style="color:#fff; font-size:11px; line-height:1;">✓</span>' : '') + '</div>';
    };
    var selectedCount = options.length - excludedList.length;
    var summary = !options.length ? 'ยังไม่มีข้อมูล'
      : excludedList.length === 0 ? allLabel
      : selectedCount <= 0 ? 'ไม่ได้เลือก'

      : 'เลือก ' + selectedCount + ' รายการ';
    var trigger = '<div data-action="toggleFilterDropdown" data-filter="' + filterKey + '" style="width:100%; box-sizing:border-box; padding:10px 12px; border-radius:10px; border:1px solid rgba(124,92,255,0.2); background:#fff; font-size:13.5px; color:#2b2540; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:8px;">' +

      '<span style="color:#8a86a3; flex-shrink:0; font-size:11px;">' + (isOpen ? '▲' : '▼') + '</span>' +
    '</div>';
    if (!isOpen || !options.length) return '<div data-dropdown-root style="position:relative;">' + trigger + '</div>';
    var panel = '<div style="position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:50; max-height:220px; overflow-y:auto; background:#fff; border:1px solid rgba(124,92,255,0.25); border-radius:10px; box-shadow:0 12px 28px rgba(43,37,64,0.18); padding:8px 12px;">' +
      '<label data-action="' + toggleAllAction + '" style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:#2b2540; font-weight:600; padding:4px 0 6px; margin-bottom:4px; border-bottom:1px solid rgba(124,92,255,0.12);">' + chk(excludedList.length === 0) + '(เลือกทั้งหมด)</label>' +

      }).join('') +

  // Days between an installment's due date and today: >0 overdue, 0 = due today, <0 = days until due.
  function dueDiffDays(inst) {
    if (!inst.dueDate) return null;
    var due = new Date(inst.dueDate);
    if (isNaN(due.getTime())) return null;
    var today = new Date();
    var todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    var dueMid = new Date(due.getFullYear(), due.getMonth(), due.getDate());
    return Math.round((todayMid - dueMid) / 86400000);
  }
  // Aging report over each order's current (earliest unpaid) installment — mirrors the
  // reference site's "รายงานสินเชื่อที่ครบกำหนด" bucket row.
  function renderDueBuckets(orders) {
    var active = orders.filter(function (o) { return !o.isCancelled && !o.isSold; });
    var b = { due7: 0, due3: 0, dueToday: 0, od10: 0, od30: 0, odOver30: 0 };
    active.forEach(function (o) {
      var cur = o.installments.find(function (i) { return i.effectiveStatus !== 'ชำระแล้ว'; });
      if (!cur) return;
      var d = dueDiffDays(cur);
      if (d === null) return;
      if (d < 0 && d >= -7) b.due7++;
      if (d < 0 && d >= -3) b.due3++;
      if (d === 0) b.dueToday++;
      else if (d >= 1 && d <= 10) b.od10++;
      else if (d >= 11 && d <= 30) b.od30++;
      else if (d > 30) b.odOver30++;
    });
    var total = active.length;
    var totalOverdue = b.od10 + b.od30 + b.odOver30;
    function pct(n) { return total > 0 ? (n / total * 100).toFixed(1) : '0.0'; }
    var tiles = [
      { label: 'ทั้งหมด', count: total, pctDisp: '', color: '#2b2540', bg: 'rgba(43,37,64,0.06)' },
      { label: 'ครบกำหนดภายใน 7 วัน', count: b.due7, pctDisp: pct(b.due7), color: '#4f7cff', bg: 'rgba(79,124,255,0.10)' },

  function renderNoteModal() {
    var target = state.noteModalTarget;
    var order = state.orders.find(function (o) { return o.orderId === target.orderId; });
    var inst = order && (order[trackKey(target.track)] || []).find(function (i) { return i.no === target.no; });
    var history = (inst && inst.postponeHistory) || [];
    var historyHtml = '';
    if (history.length) {
      historyHtml = '<div style="font-size:12px; color:#6b6785; font-weight:600; margin-bottom:8px;">🔁 ประวัติการเลื่อนชำระ (' + history.length + ' ครั้ง)</div>' +
        '<div style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px; max-height:220px; overflow-y:auto;">' +
        history.map(function (h, idx) {
          var fees = [];
          if (toNumber(h.lateFee)) fees.push('ค่าปรับชำระล่าช้า ฿' + fmtMoney(h.lateFee));
          if (toNumber(h.unlockFee)) fees.push('ค่าปลดล็อคเครื่อง ฿' + fmtMoney(h.unlockFee));
          return '<div style="background:rgba(124,92,255,0.05); border:1px solid rgba(124,92,255,0.12); border-radius:12px; padding:10px 12px;">' +
            '<div style="display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:#2b2540; margin-bottom:4px;">' +
              '<span style="background:rgba(124,92,255,0.15); color:#7c5cff; border-radius:16px; padding:1px 8px; font-size:11px;">ครั้งที่ ' + (idx + 1) + '</span>' +
              esc(fmtDate(h.from)) + ' → ' + esc(fmtDate(h.to)) +
            '</div>' +
            (h.reason ? '<div style="font-size:12.5px; color:#6b6785; margin-bottom:2px;">เหตุผล: ' + esc(h.reason) + '</div>' : '') +
            (fees.length ? '<div style="font-size:12.5px; color:#c2650a; font-weight:600;">' + fees.join(' · ') + '</div>' : '') +
          '</div>';
        }).join('') +
        '</div>';
    }
    return '<div style="position:fixed; inset:0; z-index:9999; background:rgba(43,37,64,0.35); display:flex; align-items:center; justify-content:center; padding:20px;">' +
      '<div style="max-width:460px; width:100%; max-height:90vh; overflow-y:auto; background:#fff; border-radius:20px; padding:26px 26px 22px; box-shadow:0 24px 60px rgba(43,37,64,0.3);">' +
        '<div style="font-family:\'Prompt\',sans-serif; font-weight:700; font-size:18px; color:#2b2540; margin-bottom:18px;">📝 หมายเหตุ · งวดที่ ' + target.no + '</div>' +

        '<textarea data-action="noteModalDraft" rows="5" placeholder="พิมพ์หมายเหตุ..." style="width:100%; box-sizing:border-box; padding:12px 14px; border-radius:10px; border:1px solid rgba(124,92,255,0.25); background:#fbfaff; font-size:14px; color:#2b2540; outline:none; margin-bottom:20px; font-family:inherit; resize:vertical;">' + esc(state.noteModalDraft) + '</textarea>' +
        '<div style="display:flex; justify-content:flex-end; gap:10px;">' +

          '<div data-action="saveNoteModal" style="background:#2b2540; color:#fff; padding:11px 22px; border-radius:10px; font-size:13.5px; font-weight:600; cursor:pointer;">บันทึก</div>' +
        '</div>' +
      '</div>' +
    '</div>';

            renderInstallmentTable(ord.orderId, ord.accessoryInstallments, 'accessory') +
          '</div>'
        ) : '') +
      '</div>';
    }).join('');

    html += '</div></div>';
    return html;
  }

  // ค่าปรับชำระล่าช้า/ค่าปลดล็อคเครื่อง are kept separate from ยอดผ่อนต่องวด/ยอดชำระแล้ว so the
  // installment progress numbers stay accurate — this cell shows what's charged vs. actually paid.
  function renderFeeCell(inst, da) {
    var charged = toNumber(inst.lateFee) + toNumber(inst.unlockFee);
    var paid = toNumber(inst.penaltyPaid);
    if (!charged && !paid) return '<span style="color:#c4bfe0; font-size:12px;">—</span>';
    var parts = [];
    if (toNumber(inst.lateFee)) parts.push('ล่าช้า ฿' + fmtMoney(inst.lateFee));
    if (toNumber(inst.unlockFee)) parts.push('ปลดล็อค ฿' + fmtMoney(inst.unlockFee));
    var short = paid < charged - 0.005;
    return '<div style="font-size:11.5px; line-height:1.6;">' +
      '<div style="color:#c2650a; font-weight:600; margin-bottom:3px;">' + parts.join(' + ') + '</div>' +
      '<div style="display:flex; align-items:center; gap:5px;">' +
        '<span style="color:#6b6785; white-space:nowrap;">จ่ายแล้ว</span>' +
        '<input type="text" inputmode="decimal" value="' + esc(fmtMoney(paid)) + '" data-field="penaltyPaid"' + da + ' style="width:66px; box-sizing:border-box; border-radius:7px; padding:4px 6px; font-size:11px; text-align:right; font-weight:700; color:' + (short ? '#e03131' : '#12b886') + '; border:1px solid ' + (short ? 'rgba(224,49,49,0.3)' : 'rgba(18,184,134,0.3)') + '; background:' + (short ? 'rgba(224,49,49,0.05)' : 'rgba(18,184,134,0.06)') + '; outline:none;" />' +
      '</div>' +
      (short ? '<div style="color:#e03131;">ขาด ฿' + fmtMoney(charged - paid) + '</div>' : '') +
    '</div>';
  }
  function renderInstallmentTable(orderId, installments, track) {
    if (!installments.length) {
      return '<div style="padding:32px 20px; text-align:center; color:#8a86a3; font-size:13px; background:rgba(124,92,255,0.03); border:1.5px dashed rgba(124,92,255,0.25); border-radius:16px;">📭 ยังไม่มีงวดชำระ — กด "+ เพิ่มงวด" ด้านบนเพื่อเริ่มกรอก</div>';
    }
    var inputBase = 'box-sizing:border-box; border-radius:9px; padding:7px 10px; font-size:12.5px; color:#2b2540; background:#fff; outline:none;';
    var cols = ['งวด', 'วันครบกำหนด', 'ยอดผ่อนต่องวด', 'ชำระแล้ว / วันที่ชำระ', 'ขาด/เกิน', 'ค่าปรับ (แยกจากค่างวด)', 'ส่วนลด', 'สถานะ', 'หมายเหตุ'];
    var head = '<tr>' + cols.map(function (c) {
      return '<th style="text-align:left; padding:12px 14px; font-size:11px; letter-spacing:0.03em; color:#7c5cff; font-weight:700; white-space:nowrap; background:rgba(124,92,255,0.06); border-bottom:1.5px solid rgba(124,92,255,0.16);">' + c + '</th>';
    }).join('') + '</tr>';
    var rows = installments.map(function (inst) {
      var da = ' data-order="' + esc(orderId) + '" data-no="' + inst.no + '" data-track="' + track + '"';
      var dd = LATE_STATUSES.indexOf(inst.effectiveStatus) !== -1 ? dueDiffDays(inst) : null;
      var overdue = (dd !== null && dd > 0) ? dd : 0;
      var td = 'padding:12px 14px; border-bottom:1px solid rgba(124,92,255,0.08); vertical-align:middle;';
      var paidNum = toNumber(inst.amountPaid);
      var diff = paidNum - (toNumber(inst.amountDue) - toNumber(inst.discount));
      var diffBadge = '';
      if (paidNum > 0) {
        if (Math.abs(diff) < 0.005) diffBadge = '<span style="color:#12b886; font-size:11.5px; font-weight:700;">✓ ตรง</span>';
        else if (diff < 0) diffBadge = '<span style="background:rgba(224,49,49,0.10); color:#e03131; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap;">ขาด ฿' + fmtMoney(Math.abs(diff)) + '</span>';
        else diffBadge = '<span style="background:rgba(79,124,255,0.10); color:#4f7cff; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap;">เกิน ฿' + fmtMoney(diff) + '</span>';
      }
      return '<tr data-inst-row style="border-left:3px solid ' + inst.statusColor + ';">' +
        '<td style="' + td + '"><div style="width:26px; height:26px; border-radius:50%; background:' + inst.statusSoft + '; color:' + inst.statusColor + '; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12.5px;">' + inst.no + '</div></td>' +
        '<td style="' + td + '"><div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">' +
          '<input type="date" value="' + esc(inst.dueDate) + '" data-field="dueDate"' + da + ' style="' + inputBase + ' border:1px solid rgba(124,92,255,0.2);" />' +
          '<button data-action="openPostpone"' + da + ' style="border:1px solid rgba(124,92,255,0.3); background:#fff; color:#7c5cff; border-radius:8px; padding:6px 10px; font-size:11.5px; font-weight:600; cursor:pointer; white-space:nowrap;">🔁 เลื่อนวันชำระ</button>' +
          (overdue > 0 ? '<span style="background:rgba(224,49,49,0.10); color:#e03131; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap;">⏰ เกิน ' + overdue + ' วัน</span>' : '') +
        '</div></td>' +
        '<td style="' + td + '"><input type="text" inputmode="decimal" value="' + esc(fmtMoney(inst.amountDue)) + '" data-field="amountDue"' + da + ' style="' + inputBase + ' width:92px; text-align:right; font-weight:600; border:1px solid rgba(124,92,255,0.2);" /></td>' +
        '<td style="' + td + '"><div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">' +
          '<input type="text" inputmode="decimal" value="' + esc(fmtMoney(inst.amountPaid)) + '" data-field="amountPaid"' + da + ' style="' + inputBase + ' width:84px; text-align:right; font-weight:700; color:#0b7a5b; border:1px solid rgba(18,184,134,0.3); background:rgba(18,184,134,0.06);" />' +
          '<input type="date" value="' + esc(inst.paidDate) + '" data-field="paidDate"' + da + ' style="' + inputBase + ' font-size:11.5px; color:#6b6785; border:1px solid rgba(124,92,255,0.15);" />' +
        '</div></td>' +
        '<td style="' + td + '">' + diffBadge + '</td>' +
        '<td style="' + td + '">' + renderFeeCell(inst, da) + '</td>' +
        '<td style="' + td + '"><input type="text" inputmode="decimal" value="' + esc(fmtMoney(inst.discount)) + '" data-field="discount"' + da + ' style="' + inputBase + ' width:70px; text-align:right; border:1px solid rgba(255,159,67,0.3);" /></td>' +
        '<td style="' + td + '"><div style="display:flex; align-items:center; gap:6px;">' +
          '<select data-field="status"' + da + ' style="padding:7px 10px; border-radius:10px; border:1px solid ' + inst.statusBorder + '; background:' + inst.statusSoft + '; color:' + inst.statusColor + '; font-size:12px; font-weight:700; outline:none; cursor:pointer;">' +
            STATUS_OPTIONS.map(function (opt) { return '<option value="' + esc(opt) + '"' + (opt === inst.effectiveStatus ? ' selected' : '') + ' style="color:#000; background:#fff;">' + esc(opt) + '</option>'; }).join('') +
          '</select>' +
          (inst.statusOverride ? '<button data-action="resetOverride"' + da + ' title="รีเซ็ตสถานะเป็นอัตโนมัติ" style="border:none; background:transparent; cursor:pointer; font-size:14px; color:#7c5cff; flex-shrink:0;">⟲</button>' : '') +
          '<button data-action="deleteInstallment"' + da + ' title="ลบงวดนี้" style="border:none; background:transparent; cursor:pointer; font-size:14px; color:#e03131; flex-shrink:0;">🗑</button>' +
        '</div></td>' +
        '<td style="' + td + '"><div data-action="openNoteModal"' + da + ' title="คลิกเพื่อดู/แก้ไขหมายเหตุเต็ม" style="' + inputBase + ' width:150px; max-width:150px; border:1px dashed rgba(124,92,255,0.25); background:transparent; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' +
          ((inst.postponeHistory && inst.postponeHistory.length) ? '<span style="color:#7c5cff; font-weight:700;">🔁×' + inst.postponeHistory.length + '</span> ' : '') +
          (inst.note ? esc(inst.note) : (inst.postponeHistory && inst.postponeHistory.length ? '' : '<span style="color:#a39dc2;">+ หมายเหตุ</span>')) +
        '</div></td>' +
      '</tr>';
    }).join('');
    return '<div style="overflow-x:auto; border:1px solid rgba(124,92,255,0.14); border-radius:16px; background:rgba(255,255,255,0.55); box-shadow:0 4px 16px rgba(124,92,255,0.06);">' +
      '<table style="width:100%; border-collapse:collapse; min-width:840px;"><thead>' + head + '</thead><tbody>' + rows + '</tbody></table>' +
    '</div>';
  }

  // ลูกหนี้ปัจจุบัน/เก่า — plain <a> navigation (full reload), not a JS click handler, so switching
  // always goes through the app's normal boot sequence fresh. See DATASET_ID above for why this
  // isn't an in-place hot-swap.
  function datasetSwitcher() {
    var pillBase = 'text-decoration:none; padding:6px 14px; border-radius:20px; font-size:12.5px; font-weight:700; white-space:nowrap;';
    var activeStyle = pillBase + ' background:linear-gradient(135deg,#7c5cff,#6647e0); color:#fff;';
    var inactiveStyle = pillBase + ' background:rgba(124,92,255,0.08); color:#6b6785;';
    return '<div style="display:flex; align-items:center; gap:6px; margin-right:10px; padding:3px; background:rgba(124,92,255,0.05); border-radius:24px;">' +
      '<a href="?" style="' + (IS_OLD_DATASET ? inactiveStyle : activeStyle) + '">ลูกหนี้ปัจจุบัน</a>' +
      '<a href="?dataset=old" style="' + (IS_OLD_DATASET ? activeStyle : inactiveStyle) + '">ลูกหนี้เก่า (ก่อน 1/10/2025)</a>' +
    '</div>';
  }
  // ---------- Sidebar (static shell) ----------
  function navItem(id, action, iconHtml, label) {
    return '<div id="' + id + '" data-action="' + action + '" style="cursor:pointer; display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; font-weight:600; font-size:14px;">' +
      '<div style="width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; position:relative;">' + iconHtml + '</div>' + label + '</div>';
  }
  function buildShell() {
    var dashIcon = '<div style="display:grid; grid-template-columns:1fr 1fr; gap:2px; width:14px; height:14px;"><div style="background:currentColor; border-radius:2px;"></div><div style="background:currentColor; border-radius:2px; opacity:0.55;"></div><div style="background:currentColor; border-radius:2px; opacity:0.55;"></div><div style="background:currentColor; border-radius:2px;"></div></div>';
    var trackIcon = '<div style="width:11px; height:11px; border:2px solid currentColor; border-radius:50%; box-sizing:border-box; position:absolute; top:3px; left:3px;"></div><div style="position:absolute; width:2px; height:6px; background:currentColor; border-radius:1px; transform:rotate(-45deg); right:2px; bottom:2px;"></div>';
    var uploadIcon = '<div style="width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent; border-bottom:5px solid currentColor;"></div><div style="width:3px; height:5px; background:currentColor;"></div><div style="width:12px; height:2px; background:currentColor; border-radius:1px; margin-top:1px;"></div>';

    // Horizontal top bar instead of a left sidebar — frees up screen width for the wide
    // installment table (many columns) so it needs less horizontal scrolling.
    var topbar = '<div style="width:100%; position:sticky; top:0; background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(124,92,255,0.12); padding:12px 24px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; z-index:2; box-sizing:border-box;">' +
      '<div style="display:flex; align-items:center; gap:10px; padding:2px 10px 2px 0; margin-right:8px;">' +
        '<div style="width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#7c5cff,#6647e0); display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 6px 16px rgba(124,92,255,0.35); gap:3px;"><div style="width:3px; height:9px; border-radius:2px; background:rgba(255,255,255,0.65);"></div><div style="width:3px; height:14px; border-radius:2px; background:#fff;"></div><div style="width:3px; height:11px; border-radius:2px; background:rgba(255,255,255,0.85);"></div></div>' +
        '<div style="min-width:0;"><div style="font-family:\'Prompt\',sans-serif; font-weight:700; font-size:13.5px; color:#2b2540; line-height:1.3; white-space:nowrap;">ระบบติดตามหนี้และผ่อนชำระ</div></div>' +
      '</div>' +
      navItem('tab-dashboard', 'goDashboard', dashIcon.replace('position:relative;', ''), 'Dashboard') +
      navItem('tab-tracking', 'goTracking', trackIcon, 'ติดตามหนี้') +
      navItem('tab-upload', 'goUpload', uploadIcon, 'อัพโหลดไฟล์') +
      '<div style="flex:1;"></div>' +
      datasetSwitcher() +
      '<div id="cloudStatusPill">' + cloudStatusPillInner() + '</div>' +
    '</div>';

    document.getElementById('app').innerHTML =
      '<div style="min-height:100vh; background: linear-gradient(160deg, #f3f1fb 0%, #eef2fb 45%, #f6f4fd 100%); position:relative; overflow-x:hidden; display:flex; flex-direction:column; animation:fadeInUp 0.5s ease;">' +
        '<div style="position:absolute; top:-120px; right:-100px; width:420px; height:420px; border-radius:50%; background:radial-gradient(circle, rgba(124,92,255,0.30), transparent 70%); filter:blur(10px); pointer-events:none; animation:floatBlobA 14s ease-in-out infinite;"></div>' +
        '<div style="position:absolute; bottom:-160px; left:-140px; width:480px; height:480px; border-radius:50%; background:radial-gradient(circle, rgba(79,124,255,0.22), transparent 70%); filter:blur(10px); pointer-events:none; animation:floatBlobB 16s ease-in-out infinite;"></div>' +
        topbar +
        '<div style="flex:1; min-width:0; padding:28px 28px 90px; position:relative; z-index:1;"><div id="main-inner" style="max-width:1600px; margin:0 auto; position:relative;"></div></div>' +
      '</div>';
  }

  // ---------- Render ----------
  function updateTabStyles() {
    var tabs = [['tab-dashboard', 'dashboard'], ['tab-tracking', 'tracking'], ['tab-upload', 'upload']];
    tabs.forEach(function (t) {
      var el = document.getElementById(t[0]);
      if (!el) return;
      var active = state.view === t[1];
      el.style.color = active ? '#7c5cff' : '#6b6785';
      el.style.background = active ? 'rgba(124,92,255,0.12)' : 'transparent';
    });
  }
  function render() {
    // Every edit (typing in a field, ticking a status dropdown, etc.) replaces main-inner's whole
    // innerHTML — the browser has no DOM node to keep a scroll position on, so both the page and
    // the customer-detail modal's own scroll silently reset to the top. Capture before, restore
    // after, so editing a งวด near the bottom of a long installment table doesn't bounce the view
    // back up every single keystroke/blur.
    var prevModal = document.getElementById('customerDetailModal');
    var modalScrollTop = prevModal ? prevModal.scrollTop : null;
    var pageScrollY = window.scrollY;
    CV = computeView();
    var inner = document.getElementById('main-inner');
    if (state.view === 'upload') inner.innerHTML = renderUpload();
    else if (state.view === 'tracking') inner.innerHTML = renderTracking();
    else inner.innerHTML = renderDashboard();
    updateTabStyles();
    if (modalScrollTop !== null) {
      var newModal = document.getElementById('customerDetailModal');
      if (newModal) newModal.scrollTop = modalScrollTop;
    }
    if (pageScrollY) window.scrollTo(0, pageScrollY);
  }

  // ---------- Event delegation ----------
  function initEvents() {
    var app = document.getElementById('app');

    app.addEventListener('click', function (e) {
      // Close an open multi-select filter dropdown (สถานะการชำระ/ประเภทการซื้อ) on any click
      // outside it — clicks on its own trigger or checkbox items land inside [data-dropdown-root]
      // and are left alone so the panel stays open while checking multiple items.
      if (state.openFilterDropdown && !e.target.closest('[data-dropdown-root]')) {
        state.openFilterDropdown = null;
        render();
      }
      var t = e.target.closest('[data-action]');
      if (!t) return;
      var a = t.getAttribute('data-action');
      switch (a) {
        case 'goDashboard': state.view = 'dashboard'; render(); break;
        case 'goTracking': state.view = 'tracking'; render(); break;
        case 'goUpload': state.view = 'upload'; render(); break;
        case 'toggleFilters': state.showFilters = !state.showFilters; render(); break;
        case 'performSearch': performSearch(); break;
        case 'clearAllFilters': clearAllFilters(); break;
        case 'clearQuery': state.query = ''; render(); break;
        case 'exportCsv': exportFilteredCsv(CV.filteredOrders); break;
        case 'downloadTemplate': downloadTemplate(t.getAttribute('data-type')); break;
        case 'clearToEmpty': if (window.confirm('ล้างข้อมูลทั้งหมดเพื่อเริ่มจากว่างเปล่า (พร้อมอัปโหลดข้อมูลจริง)?\n(ยกเลิกไม่ได้)')) resetAllData(false); break;
        case 'resetToSample': if (window.confirm('ล้างข้อมูลทั้งหมด และกลับไปเป็นข้อมูลตัวอย่าง?\n(ยกเลิกไม่ได้)')) resetAllData(true); break;
        case 'toggleCancelledDetail': state.showCancelledDetail = !state.showCancelledDetail; render(); break;
        case 'toggleSoldDetail': state.showSoldDetail = !state.showSoldDetail; render(); break;
        case 'selectCustomer': selectCustomer(t.getAttribute('data-cid')); break;
        case 'closeDetail': state.selectedCustomerId = null; render(); break;
        case 'saveNote': saveCustomerNote(); break;
        case 'resetOverride': resetOverride(t.getAttribute('data-order'), Number(t.getAttribute('data-no')), t.getAttribute('data-track')); break;
        case 'addInstallment': addInstallment(t.getAttribute('data-order'), t.getAttribute('data-track')); break;
        case 'deleteInstallment': deleteInstallment(t.getAttribute('data-order'), Number(t.getAttribute('data-no')), t.getAttribute('data-track')); break;
        case 'openPostpone': openPostpone(t.getAttribute('data-order'), Number(t.getAttribute('data-no')), t.getAttribute('data-track')); break;
        case 'closePostpone': closePostpone(); break;
        case 'confirmPostpone': confirmPostpone(); break;
        case 'openNoteModal': openNoteModal(t.getAttribute('data-order'), Number(t.getAttribute('data-no')), t.getAttribute('data-track')); break;
        case 'closeNoteModal': closeNoteModal(); break;
        case 'saveNoteModal': saveNoteModal(); break;
        case 'togglePurchaseType': togglePurchaseType(t.getAttribute('data-type')); break;
        case 'toggleAllPurchaseTypes': toggleAllPurchaseTypes(); break;
        case 'togglePaymentStatusFilter': togglePaymentStatusFilter(t.getAttribute('data-type')); break;
        case 'toggleAllPaymentStatusFilter': toggleAllPaymentStatusFilter(); break;
        case 'toggleFilterDropdown': {
          var fk = t.getAttribute('data-filter');
          state.openFilterDropdown = state.openFilterDropdown === fk ? null : fk;
          render();
          break;
        }
        case 'prevPage': state.page = Math.max(1, (state.page || 1) - 1); render(); break;
        case 'nextPage': state.page = (state.page || 1) + 1; render(); break;
      }
    });

    // Live typing in the search box: update state without a full re-render (keeps focus)
    app.addEventListener('input', function (e) {
      var t = e.target;
      if (t.getAttribute && t.getAttribute('data-action') === 'queryInput') {
        state.query = t.value;
        var btn = document.getElementById('clearQueryBtn');
        if (btn) btn.style.display = t.value ? 'block' : 'none';
      }
    });

    app.addEventListener('keydown', function (e) {
      var t = e.target;
      if (t.getAttribute && t.getAttribute('data-action') === 'queryInput' && e.key === 'Enter') {
        state.query = t.value;
        performSearch();
      }
    });

    app.addEventListener('change', function (e) {
      var t = e.target;
      if (!t.getAttribute) return;
      var field = t.getAttribute('data-field');
      if (field) {
        var moneyInstFields = ['amountDue', 'amountPaid', 'discount', 'penaltyPaid'];
        var fieldVal = moneyInstFields.indexOf(field) !== -1 ? toNumber(t.value) : t.value;
        updateInstallment(t.getAttribute('data-order'), Number(t.getAttribute('data-no')), field, fieldVal, t.getAttribute('data-track'));
        return;
      }
      var orderField = t.getAttribute('data-order-field');
      if (orderField) {
        var numericOrderFields = ['payDay', 'downPayment', 'discount', 'productPrice', 'accessoryProductPrice', 'accessoryDownPayment', 'accessoryPayDay'];
        updateOrderField(t.getAttribute('data-order'), orderField, numericOrderFields.indexOf(orderField) !== -1 ? toNumber(t.value) : t.value);
        return;
      }
      var a = t.getAttribute('data-action');
      switch (a) {
        case 'queryInput': state.query = t.value; break;
        case 'noteDraft': state.customerNoteDraft = t.value; break;
        case 'postponeDate': state.postponeDate = t.value; break;
        case 'postponeReason': state.postponeReason = t.value; break;
        case 'postponeLateFee': state.postponeLateFee = toNumber(t.value); break;
        case 'postponeUnlockFee': state.postponeUnlockFee = toNumber(t.value); break;
        case 'noteModalDraft': state.noteModalDraft = t.value; break;
        case 'setInstallmentAmount': setInstallmentAmount(t.getAttribute('data-order'), toNumber(t.value), t.getAttribute('data-track')); break;
        case 'setInstallmentCount': setInstallmentCount(t.getAttribute('data-order'), t.getAttribute('data-track'), toNumber(t.value)); break;
        case 'filter': state[t.getAttribute('data-key')] = t.value; render(); break;
        case 'setPageSize': state.pageSize = Number(t.value) || 50; state.page = 1; render(); break;
        case 'onDebtFile': onDebtFileChange(t.files[0]); t.value = ''; break;
        case 'onPaymentFile': onPaymentFileChange(t.files[0]); t.value = ''; break;
      }
    });
  }

  // ---------- Cloud status pill ----------
  function cloudStatusPillInner() {
    var map = {
      local:      { c: '#12b886', bg: 'rgba(18,184,134,0.08)', t: 'ข้อมูลพร้อมใช้งาน', pulse: true },
      connecting: { c: '#8a86a3', bg: 'rgba(138,134,163,0.10)', t: 'กำลังเชื่อมต่อ…', pulse: false },
      online:     { c: '#12b886', bg: 'rgba(18,184,134,0.08)', t: 'ซิงก์ข้อมูลร่วม (ออนไลน์)', pulse: true },
      saving:     { c: '#c2650a', bg: 'rgba(240,140,0,0.10)', t: 'กำลังบันทึก…', pulse: false },
      offline:    { c: '#e03131', bg: 'rgba(224,49,49,0.08)', t: 'ออฟไลน์ — จะบันทึกเมื่อกลับมา', pulse: false }
    };
    var m = map[cloudStatus] || map.local;
    var titleAttr = (cloudStatus === 'offline' && cloudErrorDetail) ? ' title="' + esc(cloudErrorDetail) + '"' : '';
    return '<div' + titleAttr + ' style="display:flex; gap:8px; align-items:center; font-size:12px; color:#6b6785; background:' + m.bg + '; padding:10px 14px; border-radius:12px; cursor:' + (titleAttr ? 'help' : 'default') + ';">' +
      '<div style="width:8px;height:8px;border-radius:50%;background:' + m.c + ';' + (m.pulse ? ' animation:softPulse 2s ease-in-out infinite;' : '') + ' flex-shrink:0;"></div> ' + m.t + '</div>' +
      (cloudStatus === 'offline' && cloudErrorDetail ? '<div style="font-size:10.5px; color:#e03131; padding:2px 14px 0; max-width:260px; line-height:1.4;">' + esc(cloudErrorDetail) + '</div>' : '');
  }
  function updateCloudStatus() {
    var el = document.getElementById('cloudStatusPill');
    if (el) el.innerHTML = cloudStatusPillInner();
  }

  // ---------- Boot ----------
  if (IS_OLD_DATASET) document.title = 'ลูกหนี้เก่า (ก่อน 1/10/2025) — ระบบติดตามหนี้และผ่อนชำระ';
  buildShell();
  initEvents();
  render();
  if (CLOUD_ENABLED && initCloud()) {
    // Open access — connects straight to the shared cloud state, no login step.
    cloudConnect().then(function () {
      render(); updateCloudStatus(); startCloudPolling();
      // Push the self-healed statuses back to the shared file so every other client sees the fix too.
      if (_lastRepairChanged) { _lastRepairChanged = false; savePersisted(); }
    }).catch(function () { cloudStatus = 'offline'; updateCloudStatus(); });
  } else if (_lastRepairChanged) {
    _lastRepairChanged = false; savePersisted();
  }
})();
</script>
</body>
</html>
